<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LiveMes. Elite</title>
<style>
    :root {
        --accent: #007AFF;
        --bg: #0f172a;
        --glass: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text: #f8fafc;
        --my-bubble: linear-gradient(135deg, #007AFF, #0051a8);
        --other-bubble: rgba(255, 255, 255, 0.07);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }

    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
        background: var(--bg); color: var(--text); 
        margin: 0; height: 100dvh; display: flex; overflow: hidden;
    }

    /* Экран авторизации */
    #auth-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        z-index: 99999; background: var(--bg);
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        pointer-events: all;
    }

    /* Сайдбар */
    #sidebar {
        width: 300px; min-width: 300px; background: #0f172a;
        border-right: 1px solid var(--glass-border);
        display: flex; flex-direction: column; z-index: 2000; 
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    @media (max-width: 768px) {
        #sidebar { position: absolute; height: 100%; transform: translateX(-100%); width: 85%; }
        #sidebar.open { transform: translateX(0); box-shadow: 20px 0 60px rgba(0,0,0,0.8); }
    }

    .folder-tabs {
        display: flex; gap: 8px; padding: 15px; overflow-x: auto;
        scrollbar-width: none; border-bottom: 1px solid var(--glass-border);
    }
    .folder-tab {
        padding: 7px 15px; font-size: 13px; border-radius: 18px;
        background: var(--glass); cursor: pointer; white-space: nowrap;
        opacity: 0.6; transition: 0.2s;
    }
    .folder-tab.active { background: var(--accent); opacity: 1; color: white; }

    #chat-items-container { flex: 1; overflow-y: auto; padding: 10px; }
    
    .nav-item {
        padding: 12px 15px; border-radius: 14px; cursor: pointer;
        display: flex; align-items: center; gap: 12px; transition: 0.2s;
        margin-bottom: 4px;
    }
    .nav-item.active { background: rgba(0, 122, 255, 0.15); border-left: 3px solid var(--accent); }

    /* Основной блок чата */
    #main { flex: 1; display: flex; flex-direction: column; position: relative; }

    #header {
        padding: 10px 15px;
        padding-top: max(10px, env(safe-area-inset-top));
        border-bottom: 1px solid var(--glass-border);
        display: flex; justify-content: space-between; align-items: center;
        background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); z-index: 1000;
    }

    /* Аватарки */
    .msg-avatar, #chat-header-avatar, .u-avatar { 
        width: 36px; height: 36px; border-radius: 50%; 
        flex-shrink: 0; background-color: var(--accent);
        background-size: cover; background-position: center;
        display: flex; align-items: center; justify-content: center;
        font-weight: bold; font-size: 14px; color: white;
    }

    #messages { 
        flex: 1; overflow-y: auto; padding: 15px; 
        display: flex; flex-direction: column; gap: 12px; 
        padding-bottom: 100px;
    }

    .msg-row { display: flex; gap: 10px; align-items: flex-end; max-width: 85%; }
    .msg-row.me { flex-direction: row-reverse; align-self: flex-end; }
    .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; word-wrap: break-word; }
    .me .bubble { background: var(--my-bubble); color: white; border-bottom-right-radius: 4px; }
    .other .bubble { background: var(--other-bubble); color: white; border-bottom-left-radius: 4px; border: 1px solid var(--glass-border); }

    #footer {
        position: absolute; bottom: 0; width: 100%; padding: 10px 15px;
        padding-bottom: max(15px, env(safe-area-inset-bottom));
        background: rgba(15, 23, 42, 0.95); border-top: 1px solid var(--glass-border);
        display: flex; align-items: center; gap: 10px;
    }

    #mInput {
        flex: 1; background: var(--glass); border: 1px solid var(--glass-border);
        border-radius: 20px; padding: 10px 15px; color: white; font-size: 16px;
    }

    .user-panel { padding: 15px; background: rgba(0,0,0,0.2); border-top: 1px solid var(--glass-border); display: flex; align-items: center; gap: 12px; }
    .hidden { display: none !important; }
    button { cursor: pointer; border: none; }
    #auth-btn { background: var(--accent); color: white; padding: 12px 25px; border-radius: 8px; width: 100%; font-weight: bold; }
</style>
</head>
<body>

<div id="auth-screen">
    <div style="text-align:center; background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid var(--glass-border); width: 90%; max-width: 400px;">
        <h1 id="auth-title" style="color:var(--accent); margin-bottom:25px;">LiveMes.</h1>
        <input type="email" id="email" placeholder="Email" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--glass-border);">
        <input type="password" id="pass" placeholder="Пароль" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--glass-border);">
        <div id="reg-fields" class="hidden">
            <input type="text" id="reg-name" placeholder="Ваше имя" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--glass-border);">
            <input type="text" id="reg-nick" placeholder="Ваш @ник" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; background:rgba(255,255,255,0.05); color:white; border:1px solid var(--glass-border);">
        </div>
        <button id="auth-btn">Войти</button>
        <p id="auth-toggle" style="font-size:13px; opacity:0.7; margin-top:20px; cursor:pointer;">Нет аккаунта? <b>Зарегистрироваться</b></p>
    </div>
</div>

<div id="sidebar">
    <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin:0; font-size: 24px;">Чаты</h2>
        <button id="addChatBtn" style="background:var(--glass); color:white; border-radius:50%; width:30px; height:30px;">+</button>
    </div>
    <div class="folder-tabs">
        <div class="folder-tab active" data-folder="Все">Все</div>
        <div class="folder-tab" data-folder="Личные">Личные</div>
        <div class="folder-tab" data-folder="Группы">Группы</div>
    </div>
    <div id="active-list" style="flex:1; overflow-y:auto;">
        <div class="nav-item" id="chat-global"><span>🌐</span> Глобальный чат</div>
        <div class="nav-item" id="chat-saved"><span>🔖</span> <b>Избранное</b></div>
        <div id="chat-items-container"></div>
    </div>
    <div class="user-panel">
        <div class="u-avatar" id="u-avatar">?</div>
        <div style="flex:1">
            <div id="u-name" style="font-weight:bold; font-size:14px;">Загрузка...</div>
            <div id="u-nick" style="font-size:11px; opacity:0.5;">@nick</div>
        </div>
        <button id="logoutBtn" style="background:none; color:#ef4444; font-size:12px;">Выход</button>
    </div>
</div>

<div id="main">
    <div id="header">
        <div style="display:flex; align-items:center; gap:12px;">
            <span id="menuBtn" style="font-size:24px; cursor:pointer;">☰</span>
            <div id="chat-header-avatar" style="width:34px; height:34px; display:none;"></div>
            <div>
                <h3 id="chat-title" style="margin:0; font-size:16px;">LiveMes.💎</h3>
                <div id="chat-status" style="font-size:10px; opacity:0.4;">онлайн</div>
            </div>
        </div>
        <button id="del-btn" class="btn-del hidden" style="background:none; border:1px solid #ef4444; color:#ef4444; padding:5px 10px; border-radius:8px; font-size:12px;">Удалить</button>
    </div>
    <div id="messages"></div>
    <div id="footer">
        <input type="text" id="mInput" placeholder="Сообщение...">
        <button id="sendBtn" style="background:var(--accent); color:white; width:40px; height:40px; border-radius:50%;">➔</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, addDoc, query, onSnapshot, serverTimestamp, doc, getDoc, setDoc, where, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAF8yT2TZtgJCVjZpsIWusH-25jZh2Cts",
        authDomain: "github-messenger-22bd3.firebaseapp.com",
        projectId: "github-messenger-22bd3",
        storageBucket: "github-messenger-22bd3.firebasedatabase.app",
        messagingSenderId: "367012361010",
        appId: "1:367012361010:web:d02a53013d1e2387d25d2b"
    };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, { experimentalForceLongPolling: true, localCache: persistentLocalCache({tabManager: persistentMultipleTabManager()}) });
    const auth = getAuth(app);

    let user = null, myNick = "", myName = "", myAvatar = "", currentChatId = "global", unsubMsgs = null, currentFolder = "Все", allChats = [], isRegMode = false;

    const parseMD = (t) => t.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>');
    const formatTime = (ts) => ts ? ts.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

    const updateUI = (data) => {
        document.getElementById('u-name').innerText = data.name || "Пользователь";
        document.getElementById('u-nick').innerText = "@" + (data.username || "user");
        myAvatar = data.avatar || "";
        const av = document.getElementById('u-avatar');
        if(myAvatar) { av.style.backgroundImage = `url('${myAvatar}')`; av.innerText = ""; }
        else { av.style.backgroundImage = "none"; av.innerText = (data.name ? data.name[0] : "?").toUpperCase(); }
    };

    // --- Авторизация ---
    onAuthStateChanged(auth, async (u) => {
        if (u) {
            user = u;
            document.getElementById('auth-screen').classList.add('hidden');
            const uDoc = await getDoc(doc(db, "users", u.uid));
            if (uDoc.exists()) {
                const data = uDoc.data();
                myNick = data.username; myName = data.name; myAvatar = data.avatar;
                updateUI(data); loadSidebar(); switchChat("global", "Глобальный чат");
            }
        } else {
            user = null;
            document.getElementById('auth-screen').classList.remove('hidden');
        }
    });

    document.getElementById('auth-btn').onclick = async (e) => {
        e.preventDefault();
        const m = document.getElementById('email').value.trim(), p = document.getElementById('pass').value.trim();
        if(!m || !p) return alert("Заполни поля!");
        try {
            if (isRegMode) {
                const n = document.getElementById('reg-name').value, nick = document.getElementById('reg-nick').value.trim().toLowerCase();
                const res = await createUserWithEmailAndPassword(auth, m, p);
                await setDoc(doc(db, "users", res.user.uid), { name: n, username: nick, avatar: "" });
            } else { await signInWithEmailAndPassword(auth, m, p); }
        } catch (e) { alert("Ошибка: " + e.code); }
    };

    document.getElementById('auth-toggle').onclick = () => { 
        isRegMode = !isRegMode; 
        document.getElementById('reg-fields').classList.toggle('hidden', !isRegMode); 
        document.getElementById('auth-btn').innerText = isRegMode ? "Создать аккаунт" : "Войти";
    };

    // --- Логика чатов ---
    const switchChat = async (id, title) => {
        if (unsubMsgs) { unsubMsgs(); unsubMsgs = null; }
        currentChatId = id;
        const box = document.getElementById('messages');
        const headerTitle = document.getElementById('chat-title');
        const headerAv = document.getElementById('chat-header-avatar');
        
        box.innerHTML = `<div style="text-align:center; opacity:0.5; margin-top:20px;">Загрузка...</div>`;
        headerTitle.innerText = title;
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('del-btn').classList.toggle('hidden', id === 'global');

        if (id === 'global') { headerAv.style.display = "none"; } 
        else {
            headerAv.style.display = "flex"; headerAv.style.backgroundImage = "none"; headerAv.innerText = title[1].toUpperCase();
            const chatObj = allChats.find(c => c.id === id);
            if (chatObj && !chatObj.isGroup) {
                const pNick = chatObj.users.find(u => u !== myNick.toLowerCase());
                onSnapshot(query(collection(db, "users"), where("username", "==", pNick)), (s) => {
                    if (!s.empty && s.docs[0].data().avatar) { headerAv.style.backgroundImage = `url('${s.docs[0].data().avatar}')`; headerAv.innerText = ""; }
                });
            }
        }

        unsubMsgs = onSnapshot(query(collection(db, "messages"), where("chatId", "==", id)), (snap) => {
            box.innerHTML = "";
            let msgs = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
            msgs.forEach(m => {
                const isMe = m.uid === user?.uid;
                const avStyle = m.senderAvatar ? `background-image: url('${m.senderAvatar}');` : `background-color: var(--accent);`;
                box.innerHTML += `
                    <div class="msg-row ${isMe ? 'me' : 'other'}">
                        <div class="msg-avatar" style="${avStyle}" onclick="${!isMe ? `window.openPrivateChat('${m.senderNick}', '${m.senderName}')` : ''}">${m.senderAvatar ? '' : (m.senderName?.[0] || '?')}</div>
                        <div class="msg-content">
                            <div class="msg-meta"><b>${m.senderNick === 'timon' ? '⭐ ' : ''}${m.senderName}</b></div>
                            <div class="bubble">${parseMD(m.text || "")}</div>
                        </div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.openPrivateChat = async (targetNick, targetName) => {
        if (targetNick === myNick) return;
        const chat = allChats.find(c => !c.isGroup && c.users.includes(targetNick.toLowerCase()) && c.users.includes(myNick.toLowerCase()));
        if (chat) switchChat(chat.id, "@" + targetNick);
        else if (confirm(`Начать чат с ${targetName}?`)) {
            const res = await addDoc(collection(db, "chats"), { name: "", users: [myNick.toLowerCase(), targetNick.toLowerCase()], isGroup: false, createdAt: serverTimestamp() });
            switchChat(res.id, "@" + targetNick);
        }
    };

    const sendMsg = async () => {
        const input = document.getElementById('mInput');
        const val = input.value.trim();
        if (!val || !user) return;
        input.value = "";
        await addDoc(collection(db, "messages"), { chatId: currentChatId, text: val, uid: user.uid, senderName: myName, senderNick: myNick, senderAvatar: myAvatar, createdAt: serverTimestamp() });
    };

    const loadSidebar = () => {
        onSnapshot(query(collection(db, "chats"), where("users", "array-contains", myNick.toLowerCase())), (snap) => {
            allChats = snap.docs.map(d => ({id: d.id, ...d.data()})); 
            renderChats();
        });
    };

    const renderChats = () => {
        const container = document.getElementById('chat-items-container');
        document.getElementById('chat-global').classList.toggle('active', currentChatId === 'global');
        document.getElementById('chat-saved').classList.toggle('active', allChats.find(c => c.id === currentChatId)?.users.length === 1);
        container.innerHTML = "";
        let filtered = allChats.filter(c => c.users.length > 1); // Скрываем Избранное из общего списка
        if (currentFolder === "Личные") filtered = filtered.filter(c => !c.isGroup);
        if (currentFolder === "Группы") filtered = filtered.filter(c => c.isGroup);
        filtered.forEach(chat => {
            const title = chat.isGroup ? chat.name : "@" + chat.users.find(u => u !== myNick.toLowerCase());
            const div = document.createElement('div');
            div.className = `nav-item ${currentChatId === chat.id ? 'active' : ''}`;
            div.innerHTML = `<span>${chat.isGroup ? '👥' : '💬'}</span> ${title}`;
            div.onclick = () => switchChat(chat.id, title);
            container.appendChild(div);
        });
    };

    // --- События ---
    document.getElementById('sendBtn').onclick = sendMsg;
    document.getElementById('mInput').onkeydown = (e) => { if(e.key === 'Enter') sendMsg(); };
    document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('chat-global').onclick = () => switchChat('global', 'Глобальный чат');
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
    
    document.getElementById('chat-saved').onclick = async () => {
        let chat = allChats.find(c => !c.isGroup && c.users.length === 1);
        if (chat) switchChat(chat.id, "Избранное");
        else {
            const res = await addDoc(collection(db, "chats"), { name: "Избранное", users: [myNick.toLowerCase()], isGroup: false, createdAt: serverTimestamp() });
            switchChat(res.id, "Избранное");
        }
    };

    document.getElementById('u-avatar').onclick = async () => {
        const n = prompt("Имя:", myName), a = prompt("Аватар (URL):", myAvatar);
        if (n || a) await updateDoc(doc(db, "users", user.uid), { name: n || myName, avatar: a || myAvatar });
    };

    document.querySelectorAll('.folder-tab').forEach(t => t.onclick = () => {
        document.querySelectorAll('.folder-tab').forEach(f => f.classList.remove('active'));
        t.classList.add('active'); currentFolder = t.dataset.folder; renderChats();
    });

    document.getElementById('addChatBtn').onclick = async () => {
        const t = prompt("Ник пользователя или название группы:");
        if(t) await addDoc(collection(db, "chats"), { name: t, users: [myNick.toLowerCase(), t.toLowerCase()], isGroup: confirm("Это группа?"), createdAt: serverTimestamp() });
    };
</script>
</body>
</html>
