<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LiveMes.</title>
    <style>
        :root { 
            --accent: #007AFF; --bg: #f2f2f7; --glass: rgba(255, 255, 255, 0.9); 
            --border: rgba(0, 0, 0, 0.08); --text: #000; --bubble-my: #007AFF; --bubble-other: #fff;
        }
        [data-theme="dark"] {
            --bg: #000; --glass: rgba(28, 28, 30, 0.95); --border: rgba(255, 255, 255, 0.1); 
            --text: #fff; --bubble-other: #1c1c1e;
        }
        
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; transition: 0.3s; overflow: hidden; }

        /* Sidebar */
        #sidebar { 
            width: 280px; background: var(--glass); border-right: 1px solid var(--border); 
            backdrop-filter: blur(20px); display: flex; flex-direction: column; padding: 15px; gap: 12px; z-index: 100;
            transition: transform 0.3s ease;
        }
        
        @media (max-width: 768px) {
            #sidebar { position: absolute; height: 100%; transform: translateX(-100%); width: 85%; }
            #sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.3); }
        }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 90; backdrop-filter: blur(2px); }
        .overlay.active { display: block; }

        #active-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .sidebar-label { margin: 15px 0 5px 5px; font-size: 10px; opacity: 0.4; text-transform: uppercase; font-weight: bold; }
        .nav-item { padding: 12px; border-radius: 12px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: space-between; color: var(--text); }
        .nav-item.active { background: var(--accent); color: #fff; }

        /* Main Area */
        #main { flex: 1; display: flex; flex-direction: column; height: 100vh; position: relative; }
        #header { padding: 12px 15px; border-bottom: 1px solid var(--border); background: var(--glass); backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; z-index: 5; }
        
        /* Исправленная область сообщений */
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 80px; }
        
        .msg-row { display: flex; flex-direction: column; max-width: 85%; }
        .my-msg { align-self: flex-end; align-items: flex-end; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 16px; background: var(--bubble-other); box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .my-msg .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
        .other-msg .bubble { border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .admin-star { color: #FFD700; }

        /* ИСПРАВЛЕННОЕ ПОЛЕ ВВОДА */
        #footer { 
            position: absolute; bottom: 0; left: 0; right: 0;
            padding: 10px 15px; background: var(--glass); border-top: 1px solid var(--border);
            backdrop-filter: blur(20px); display: flex; gap: 10px; align-items: center;
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); 
            z-index: 10;
        }
        .input-wrap { flex: 1; background: rgba(0,0,0,0.05); border-radius: 22px; display: flex; padding: 2px 14px; align-items: center; border: 1px solid var(--border); }
        #mInput { flex: 1; border: none; outline: none; background: none; color: inherit; padding: 10px; font-size: 16px; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--glass); padding: 30px; border-radius: 28px; width: 100%; max-width: 320px; text-align: center; border: 1px solid var(--border); }
        .card input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); margin: 10px 0; background: rgba(0,0,0,0.02); color: inherit; font-size: 16px; outline: none; }
        .card button { width: 100%; padding: 14px; border-radius: 12px; background: var(--accent); color: #fff; border: none; font-weight: bold; font-size: 16px; margin-top: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body data-theme="light">

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <div id="profile-screen" class="modal hidden">
        <div class="card">
            <h2 style="color:var(--accent)">LiveMes.</h2>
            <input type="text" id="pName" placeholder="Ваше имя">
            <input type="text" id="pNick" placeholder="Ник (например: timon)">
            <button onclick="saveProfile()">Начать</button>
        </div>
    </div>

    <div id="auth-screen" class="modal">
        <div class="card">
            <h1 style="color:var(--accent)">LiveMes.</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <p onclick="register()" style="font-size:13px; margin-top:15px; opacity:0.5; cursor:pointer;">Регистрация</p>
        </div>
    </div>

    <div id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0;">LiveMes.</h2>
            <button onclick="toggleTheme()" style="background:none; border:none; font-size:22px;">🌓</button>
        </div>
        <input type="text" id="globalSearch" placeholder="Поиск..." onkeydown="if(event.key==='Enter') findAny()" style="padding:10px; border-radius:10px; border:1px solid var(--border); background:rgba(0,0,0,0.03); color:inherit; outline:none;">
        <div id="active-list">
            <div class="nav-item active" id="item-global" onclick="switchChat('global', 'Глобальный чат')"><span>🌐 Глобальный</span></div>
            <div class="sidebar-label">Личные сообщения</div>
            <div id="dm-list"></div>
            <div class="sidebar-label">Группы</div>
            <div id="group-list"></div>
        </div>
        <button onclick="createGroup()" style="background:var(--accent); color:#fff; border:none; padding:12px; border-radius:12px; cursor:pointer;">+ Создать группу</button>
    </div>

    <div id="main">
        <div id="header">
            <div style="display:flex; align-items:center; gap:12px;">
                <span onclick="toggleSidebar()" style="font-size:24px; cursor:pointer;">☰</span>
                <h3 id="chat-title" style="margin:0; font-size: 1.1em;">Глобальный</h3>
            </div>
        </div>
        
        <div id="messages"></div>

        <div id="footer">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            <div class="input-wrap">
                <button onclick="document.getElementById('fileInput').click()" style="background:none; border:none; font-size:22px;">📎</button>
                <input type="text" id="mInput" placeholder="Сообщение..." autocomplete="off">
                <button id="sendBtn" style="background:none; border:none; color:var(--accent); font-size:24px;">➔</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, setDoc, updateDoc, arrayUnion, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAF8yT2TZtgJCVjZpsIWusH-25jZh2Cts",
        authDomain: "github-messenger-22bd3.firebaseapp.com",
        projectId: "github-messenger-22bd3",
        storageBucket: "github-messenger-22bd3.firebasestorage.app",
        messagingSenderId: "367012361010",
        appId: "1:367012361010:web:d02a53013d1e2387d25d2b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let user = null, myNick = "", myName = "", currentChatId = "global", unsubscribe = null;

    window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); };
    window.toggleTheme = () => { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); };

    onAuthStateChanged(auth, async (u) => {
        user = u;
        if (user) {
            document.getElementById('auth-screen').classList.add('hidden');
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                const d = snap.data(); myNick = d.username; myName = d.name || d.username;
                loadMyDMs(); loadMyGroups(); switchChat('global', 'Глобальный чат');
            } else { document.getElementById('profile-screen').classList.remove('hidden'); }
        } else document.getElementById('auth-screen').classList.remove('hidden');
    });

    window.saveProfile = async () => {
        const nick = pNick.value.trim().toLowerCase(); const name = pName.value.trim();
        if (nick.length < 3 || !name) return alert("Заполни все");
        await setDoc(doc(db, "users", user.uid), { username: nick, name: name, online: true });
        location.reload();
    };

    window.login = () => signInWithEmailAndPassword(auth, email.value, pass.value);
    window.register = () => createUserWithEmailAndPassword(auth, email.value, pass.value);

    function loadMyDMs() {
        onSnapshot(query(collection(db, "chats"), where("users", "array-contains", myNick)), (snap) => {
            const list = document.getElementById('dm-list'); list.innerHTML = "";
            snap.forEach(d => {
                const other = d.data().users.find(u => u !== myNick);
                const div = document.createElement('div'); div.className = `nav-item ${currentChatId === d.id ? 'active' : ''}`;
                div.innerHTML = `💬 @${other}`; div.onclick = () => { switchChat(d.id, "💬 " + other); if(window.innerWidth < 768) toggleSidebar(); };
                list.appendChild(div);
            });
        });
    }

    function loadMyGroups() {
        onSnapshot(query(collection(db, "groups"), where("members", "array-contains", myNick)), (snap) => {
            const list = document.getElementById('group-list'); list.innerHTML = "";
            snap.forEach(d => {
                const g = d.data();
                const div = document.createElement('div'); div.className = `nav-item ${currentChatId === g.id ? 'active' : ''}`;
                div.innerHTML = `👥 ${g.name}`; div.onclick = () => { switchChat(g.id, "👥 " + g.name); if(window.innerWidth < 768) toggleSidebar(); };
                list.appendChild(div);
            });
        });
    }

    window.findAny = async () => {
        const val = globalSearch.value.trim().toLowerCase();
        if (!val || val === myNick) return;
        const qU = query(collection(db, "users"), where("username", "==", val));
        const snapU = await getDocs(qU);
        if (!snapU.empty) {
            const target = snapU.docs[0].data().username; const dmId = [myNick, target].sort().join("_");
            await setDoc(doc(db, "chats", dmId), { id: dmId, users: [myNick, target], lastUpdate: serverTimestamp() });
            switchChat(dmId, "💬 " + target);
        } else {
            const gSnap = await getDoc(doc(db, "groups", val));
            if (gSnap.exists()) { await updateDoc(doc(db, "groups", val), { members: arrayUnion(myNick) }); switchChat(val, "👥 " + gSnap.data().name); }
            else alert("Не найдено");
        }
        globalSearch.value = "";
    };

    window.createGroup = async () => {
        const name = prompt("Название группы:");
        if (name) {
            const id = "group_" + Math.random().toString(36).substr(2, 6);
            await setDoc(doc(db, "groups", id), { name, id, creator: myNick, members: [myNick] });
            switchChat(id, "👥 " + name);
        }
    };

    const sendMsg = async (text = "", img = "") => {
        if (!user || (!text && !img)) return;
        await addDoc(collection(db, "messages"), { chatId: currentChatId, senderNick: myNick, senderName: myName, uid: user.uid, text, img, createdAt: serverTimestamp() });
        mInput.value = "";
    };

    window.deleteMsg = (id) => confirm("Удалить?") && deleteDoc(doc(db, "messages", id));

    window.switchChat = async (id, title) => {
        currentChatId = id; document.getElementById('chat-title').innerText = title;
        if (unsubscribe) unsubscribe();
        unsubscribe = onSnapshot(query(collection(db, "messages"), orderBy("createdAt", "asc")), (snap) => {
            const box = document.getElementById('messages'); box.innerHTML = "";
            snap.forEach(docSnap => {
                const d = docSnap.data(); if (d.chatId !== currentChatId) return;
                const isMe = d.uid === user.uid; const canDel = (myNick === "timon") || isMe;
                const div = document.createElement('div'); div.className = `msg-row ${isMe ? 'my-msg' : 'other-msg'}`;
                div.innerHTML = `<div class="sender-info">${d.senderNick === 'timon' ? '<span class="admin-star">★</span>' : ''} ${d.senderName || 'Гость'} (@${d.senderNick || 'anon'}) ${canDel ? `<span onclick="deleteMsg('${docSnap.id}')" style="cursor:pointer; opacity:0.5;">🗑</span>` : ''}</div>
                                 <div class="bubble">${d.text || ''} ${d.img ? `<img src="${d.img}" style="width:100%; border-radius:10px; margin-top:5px;">` : ''}</div>`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    document.getElementById('sendBtn').onclick = () => sendMsg(mInput.value);
    mInput.onkeydown = (e) => e.key === 'Enter' && sendMsg(mInput.value);
    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0]; if (file) {
            const reader = new FileReader(); reader.onloadend = () => sendMsg("", reader.result); reader.readAsDataURL(file);
        }
    };
</script>
</body>
</html>
