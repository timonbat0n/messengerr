<style>
    :root {
        --accent: #007AFF;
        --bg: #0f172a;
        --glass: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text: #f8fafc;
        --my-bubble: linear-gradient(135deg, #007AFF, #0051a8);
        --other-bubble: rgba(255, 255, 255, 0.07);
    }

    * { 
        box-sizing: border-box; 
        -webkit-tap-highlight-color: transparent; 
        outline: none; 
    }

    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        background: var(--bg); 
        color: var(--text); 
        margin: 0; 
        height: 100dvh; 
        display: flex; 
        overflow: hidden;
    }

    /* Сайдбар */
    #sidebar {
        width: 300px; 
        min-width: 300px; 
        background: #0f172a;
        border-right: 1px solid var(--glass-border);
        display: flex; 
        flex-direction: column; 
        z-index: 2000; 
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    @media (max-width: 768px) {
        #sidebar { 
            position: absolute; 
            height: 100%; 
            transform: translateX(-100%); 
            width: 85%; 
        }
        #sidebar.open { 
            transform: translateX(0); 
            box-shadow: 20px 0 60px rgba(0,0,0,0.8); 
        }
    }

    /* Папки и список чатов */
    .folder-tabs {
        display: flex; gap: 8px; padding: 15px; overflow-x: auto;
        scrollbar-width: none; border-bottom: 1px solid var(--glass-border);
    }
    .folder-tab {
        padding: 7px 15px; font-size: 13px; border-radius: 18px;
        background: var(--glass); cursor: pointer; white-space: nowrap;
        opacity: 0.6; transition: 0.2s; border: 1px solid transparent;
    }
    .folder-tab.active { background: var(--accent); opacity: 1; color: white; }

    #chat-items-container { flex: 1; overflow-y: auto; padding: 10px; }
    
    .nav-item {
        padding: 12px 15px; border-radius: 14px; cursor: pointer;
        display: flex; align-items: center; gap: 12px; transition: 0.2s;
        margin-bottom: 4px;
    }
    .nav-item.active { background: rgba(0, 122, 255, 0.15); border-left: 3px solid var(--accent); }

    /* Хедер */
    #main { 
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        position: relative; 
        background: #0f172a; 
    }

    #header {
        padding: 10px 15px;
        padding-top: max(10px, env(safe-area-inset-top)); /* Фикс под челку iPhone */
        border-bottom: 1px solid var(--glass-border);
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        z-index: 1000;
    }

    .header-info { display: flex; align-items: center; gap: 10px; overflow: hidden; }

    /* Аватарки */
    .msg-avatar, #chat-header-avatar, .u-avatar { 
        width: 36px; height: 36px; border-radius: 50%; 
        flex-shrink: 0; background-color: var(--accent);
        background-size: cover; background-position: center;
        display: flex; align-items: center; justify-content: center;
        font-weight: bold; font-size: 14px; color: white;
    }

    /* Сообщения */
    #messages { 
        flex: 1; 
        overflow-y: auto; 
        padding: 15px; 
        display: flex; 
        flex-direction: column; 
        gap: 12px;
        padding-bottom: 100px; /* Чтобы инпут не перекрывал */
    }

    .msg-row { display: flex; gap: 10px; align-items: flex-end; max-width: 85%; }
    .msg-row.me { flex-direction: row-reverse; align-self: flex-end; }

    .bubble {
        padding: 10px 14px; border-radius: 18px; font-size: 15px;
        line-height: 1.4; position: relative; word-wrap: break-word;
    }
    .me .bubble { background: var(--my-bubble); color: white; border-bottom-right-radius: 4px; }
    .other .bubble { background: var(--other-bubble); color: white; border-bottom-left-radius: 4px; border: 1px solid var(--glass-border); }

    .msg-meta { font-size: 11px; opacity: 0.5; margin-bottom: 4px; padding: 0 5px; }

    /* Поле ввода */
    #footer {
        position: absolute; 
        bottom: 0; 
        width: 100%;
        padding: 10px 15px;
        padding-bottom: max(15px, env(safe-area-inset-bottom)); /* Фикс под полоску iPhone */
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(20px);
        border-top: 1px solid var(--glass-border);
        display: flex; 
        align-items: center; 
        gap: 10px;
    }

    #mInput {
        flex: 1; background: var(--glass); border: 1px solid var(--glass-border);
        border-radius: 20px; padding: 10px 15px; color: white; font-size: 16px;
    }

    #sendBtn {
        width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
        border: none; color: white; flex-shrink: 0; cursor: pointer;
    }

    /* Профиль внизу */
    .user-panel {
        padding: 15px; background: rgba(0,0,0,0.2);
        border-top: 1px solid var(--glass-border);
        display: flex; align-items: center; gap: 12px;
    }

    .hidden { display: none !important; }
    .btn-del { background:none; border:1px solid #ef4444; color:#ef4444; border-radius:8px; padding:4px 10px; font-size:12px; }
</style>
