<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MODR. OS | Stable v5.0</title>
    <style>
        :root { --neon: #39FF14; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.15); }
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; height: 100vh; display: flex; overflow: hidden; }

        /* Панель навигации (Sidebar) */
        #sidebar { 
            width: 70px; background: rgba(10,10,10,0.9); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 20px; z-index: 10;
        }
        .chat-icon { 
            width: 45px; height: 45px; border-radius: 12px; background: var(--glass); 
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px; transition: 0.3s;
        }
        .chat-icon.active { border-color: var(--neon); box-shadow: 0 0 15px rgba(57, 255, 20, 0.3); background: rgba(57, 255, 20, 0.1); }

        /* Основная область */
        #main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #111, #000); position: relative; }
        
        /* Экран входа */
        #auth-screen { position: absolute; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--glass); backdrop-filter: blur(20px); padding: 30px; border-radius: 20px; border: 1px solid var(--border); width: 280px; text-align: center; }

        /* Шапка и Сообщения */
        #header { padding: 15px; background: rgba(0,0,0,0.6); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
        
        .msg-row { display: flex; gap: 10px; max-width: 85%; align-items: flex-start; animation: fadeIn 0.3s ease; }
        .my-msg { align-self: flex-end; flex-direction: row-reverse; }
        
        .bubble { 
            background: var(--glass); backdrop-filter: blur(10px); padding: 10px 15px; 
            border-radius: 18px; border: 1px solid var(--border); position: relative; 
        }
        .my-msg .bubble { border-color: var(--neon); background: rgba(57, 255, 20, 0.05); }
        .bubble b { color: var(--neon); font-size: 0.85em; display: block; margin-bottom: 4px; }
        
        /* Кнопка удаления */
        .del-btn { background: none; border: none; color: #ff4444; font-size: 10px; cursor: pointer; margin-top: 5px; padding: 0; opacity: 0.6; }
        .del-btn:hover { opacity: 1; }

        /* Ввод */
        #input-area { padding: 15px; display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding-bottom: env(safe-area-inset-bottom); }
        input { flex: 1; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; padding: 12px; border-radius: 12px; outline: none; }
        input:focus { border-color: var(--neon); }
        #sendBtn { background: var(--neon); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="chat-icon active" id="btn-global" onclick="switchChat('global')">🌍</div>
        <div class="chat-icon" onclick="startPrivateChat()">👤</div>
        <div class="chat-icon" onclick="logout()" style="margin-top: auto; color: #ff4444;">🚪</div>
    </div>

    <div id="main">
        <div id="auth-screen">
            <div class="auth-card">
                <h2 style="color: var(--neon); margin-top: 0;">MODR. LOG</h2>
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Password">
                <button onclick="login()" style="width: 100%; background: var(--neon); border:none; padding:12px; border-radius:10px; font-weight:bold;">ВОЙТИ</button>
                <button onclick="register()" style="background:none; color:#888; border:none; margin-top:10px; text-decoration:underline; cursor:pointer;">Создать аккаунт</button>
            </div>
        </div>

        <div id="header">
            <span id="chat-title" style="font-weight: bold; color: var(--neon);">Общий чат</span>
            <small id="user-mail" style="color: #666;"></small>
        </div>

        <div id="messages"></div>

        <div id="input-area">
            <input type="text" id="mInput" placeholder="Написать...">
            <button id="sendBtn">📡</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAF8yT2TZtgJCVjZpsIWusH-25jZh2Cts",
        authDomain: "github-messenger-22bd3.firebaseapp.com",
        projectId: "github-messenger-22bd3",
        storageBucket: "github-messenger-22bd3.firebasestorage.app",
        messagingSenderId: "367012361010",
        appId: "1:367012361010:web:d02a53013d1e2387d25d2b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    
    let user = null;
    let currentChatId = "global";
    let unsubscribe = null;
    const adminEmail = "твоя_почта@gmail.com"; // ВПИШИ СВОЮ ПОЧТУ ТУТ!

    // --- AUTH ---
    window.login = () => signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert("Ошибка: " + e.message));
    window.register = () => createUserWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert("Ошибка: " + e.message));
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (u) => {
        user = u;
        if (user) {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('user-mail').innerText = user.email;
            switchChat('global');
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
        }
    });

    // --- ЛОГИКА ЧАТОВ ---
    window.switchChat = (id) => {
        currentChatId = id;
        document.getElementById('chat-title').innerText = id === 'global' ? 'Общий чат' : 'Личные сообщения';
        
        // Визуальное переключение иконок
        document.querySelectorAll('.chat-icon').forEach(el => el.classList.remove('active'));
        if(id === 'global') document.getElementById('btn-global').classList.add('active');

        loadMessages();
    };

    window.startPrivateChat = () => {
        const target = prompt("Введите Email собеседника:");
        if (target && target !== user.email) {
            const id = [user.email, target].sort().join("_");
            switchChat(id);
        }
    };

    // Отправка
    const sendMsg = async () => {
        const text = mInput.value.trim();
        if (text && user) {
            await addDoc(collection(db, "messages"), {
                chatId: currentChatId,
                uid: user.uid,
                email: user.email,
                nick: user.email.split('@')[0],
                text: text,
                createdAt: serverTimestamp()
            });
            mInput.value = "";
        }
    };
    document.getElementById('sendBtn').onclick = sendMsg;
    mInput.onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

    // Загрузка сообщений (СТАБИЛЬНАЯ ВЕРСИЯ)
    function loadMessages() {
        if (unsubscribe) unsubscribe();
        
        // Мы берем ВСЕ сообщения и фильтруем их в браузере. Индексы больше не нужны!
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));

        unsubscribe = onSnapshot(q, (snap) => {
            const box = document.getElementById('messages');
            box.innerHTML = "";
            snap.forEach(docSnap => {
                const d = docSnap.data();
                
                // Проверка: сообщение принадлежит текущему чату?
                if (d.chatId !== currentChatId) return;

                const isMe = d.uid === user.uid;
                const isAdmin = user.email === adminEmail;
                const time = d.createdAt ? new Date(d.createdAt.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "..";

                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'my-msg' : ''}`;
                div.innerHTML = `
                    <div class="bubble">
                        <b>${d.nick} <small style="color:#666">${time}</small></b>
                        <span>${d.text}</span>
                        ${isAdmin ? `<br><button class="del-btn" onclick="deleteMessage('${docSnap.id}')">🗑️ удалить</button>` : ''}
                    </div>
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.deleteMessage = async (id) => {
        if(confirm("Удалить сообщение из базы?")) {
            await deleteDoc(doc(db, "messages", id));
        }
    };

</script>
</body>
</html>
