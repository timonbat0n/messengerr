<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminous Messenger</title>
    <style>
        :root {
            --neon-green: #39FF14;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: radial-gradient(circle at top, #1a1a1a, #000); 
            color: #eee; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* Авторизация */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; z-index: 10; }
        .auth-card { 
            background: var(--glass-bg); backdrop-filter: blur(15px); padding: 30px; 
            border-radius: 20px; border: 1px solid var(--glass-border); width: 85%; max-width: 320px; text-align: center;
        }

        /* Интерфейс чата */
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        
        #chat-header { 
            padding: 15px; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border); display: flex; justify-content: space-between; align-items: center;
        }

        #profile-editor { 
            display: none; background: rgba(30,30,30,0.95); padding: 20px; 
            border-bottom: 2px solid var(--neon-green); animation: slideDown 0.3s ease;
        }

        /* Сообщения в стиле Glassmorphism */
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .msg-container { display: flex; gap: 10px; align-items: flex-start; max-width: 85%; }
        .msg-avatar { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--neon-green); object-fit: cover; }
        
        .msg-bubble { 
            background: var(--glass-bg); backdrop-filter: blur(8px); padding: 10px 15px; 
            border-radius: 15px; border: 1px solid var(--glass-border); position: relative;
        }
        .msg-bubble b { color: var(--neon-green); font-size: 0.85em; display: block; margin-bottom: 3px; }
        .msg-bubble small { color: #666; font-size: 0.7em; margin-left: 5px; }

        /* Поля и кнопки */
        input { 
            width: 100%; box-sizing: border-box; background: rgba(255,255,255,0.07); 
            border: 1px solid #444; color: #fff; padding: 12px; border-radius: 10px; margin-bottom: 10px; outline: none;
        }
        input:focus { border-color: var(--neon-green); box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); }

        .btn-glow { 
            background: var(--neon-green); color: #000; font-weight: bold; border: none; 
            padding: 12px; border-radius: 10px; cursor: pointer; width: 100%;
        }
        .btn-text { background: none; border: none; color: #888; text-decoration: underline; cursor: pointer; font-size: 0.9em; }

        #controls { padding: 15px; background: rgba(0,0,0,0.8); display: flex; gap: 10px; padding-bottom: 30px; }

        @keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="color: var(--neon-green); margin-top:0;"> livemes</h2>
            <input type="email" id="emailInput" placeholder="Email">
            <input type="password" id="passInput" placeholder="Пароль">
            <button id="loginBtn" class="btn-glow">ВОЙТИ</button>
            <button id="regBtn" class="btn-text" style="margin-top:10px;">Создать аккаунт</button>
        </div>
    </div>

    <div id="chat-screen">
        <div id="chat-header">
            <button id="toggleProfile" class="btn-text" style="color:var(--neon-green)">⚙️ Профиль</button>
            <button id="logoutBtn" class="btn-text" style="color:#ff4444">Выйти</button>
        </div>

        <div id="profile-editor">
            <h4 style="margin-top:0">Настройки</h4>
            <input type="text" id="nickInput" placeholder="Никнейм">
            <input type="text" id="avaInput" placeholder="Ссылка на фото (URL)">
            <button id="saveProfile" class="btn-glow">СОХРАНИТЬ</button>
        </div>

        <div id="chat-messages"></div>

        <div id="controls">
            <input type="text" id="msgInput" placeholder="Сообщение..." style="margin-bottom:0">
            <button id="sendBtn" class="btn-glow" style="width:60px">📡</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAF8yT2TZtgJCVjZpsIWusH-25jZh2Cts",
        authDomain: "github-messenger-22bd3.firebaseapp.com",
        projectId: "github-messenger-22bd3",
        storageBucket: "github-messenger-22bd3.firebasestorage.app",
        messagingSenderId: "367012361010",
        appId: "1:367012361010:web:d02a53013d1e2387d25d2b",
        measurementId: "G-4JKWDFX9H1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let user = null;
    let myProfile = { nickname: '', avatar: '' };

    // --- Авторизация ---
    document.getElementById('loginBtn').onclick = () => {
        signInWithEmailAndPassword(auth, emailInput.value, passInput.value).catch(e => alert(e.message));
    };

    document.getElementById('regBtn').onclick = () => {
        createUserWithEmailAndPassword(auth, emailInput.value, passInput.value).then(() => alert("Готово!")).catch(e => alert(e.message));
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    onAuthStateChanged(auth, async (u) => {
        user = u;
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            // Загружаем профиль
            const d = await getDoc(doc(db, "users", user.uid));
            if (d.exists()) {
                myProfile = d.data();
                nickInput.value = myProfile.nickname;
                avaInput.value = myProfile.avatar;
            }
            startChat();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('chat-screen').style.display = 'none';
        }
    });

    // --- Профиль ---
    document.getElementById('toggleProfile').onclick = () => {
        const p = document.getElementById('profile-editor');
        p.style.display = p.style.display === 'block' ? 'none' : 'block';
    };

    document.getElementById('saveProfile').onclick = async () => {
        await setDoc(doc(db, "users", user.uid), {
            nickname: nickInput.value,
            avatar: avaInput.value
        }, { merge: true });
        alert("Обновлено!");
        location.reload();
    };

    // --- Чат ---
    const sendMsg = async () => {
        const text = msgInput.value;
        if (text.trim() && user) {
            await addDoc(collection(db, "messages"), {
                uid: user.uid,
                nick: myProfile.nickname || user.email.split('@')[0],
                ava: myProfile.avatar || '',
                text: text,
                createdAt: serverTimestamp()
            });
            msgInput.value = "";
        }
    };

    document.getElementById('sendBtn').onclick = sendMsg;
    msgInput.onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

    function startChat() {
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-messages');
            box.innerHTML = "";
            snap.forEach(dDoc => {
                const d = dDoc.data();
                const time = d.createdAt ? new Date(d.createdAt.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "...";
                const div = document.createElement('div');
                div.className = 'msg-container';
                if (d.uid === user.uid) div.style.alignSelf = 'flex-end';
                
                div.innerHTML = `
                    <img src="${d.ava || 'https://www.gravatar.com/avatar/0?d=mp'}" class="msg-avatar">
                    <div class="msg-bubble">
                        <b>${d.nick} <small>${time}</small></b>
                        <span>${d.text}</span>
                    </div>
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
