<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LiveMes.</title>
<style>
    :root {
        --accent: #007AFF;
        --bg: #0f172a;
        --glass: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text: #f8fafc;
        --my-bubble: linear-gradient(135deg, #007AFF, #0051a8);
        --other-bubble: rgba(255, 255, 255, 0.07);
    }

    * { 
        box-sizing: border-box; 
        -webkit-tap-highlight-color: transparent; 
        outline: none; 
    }

    body { 
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
        background: var(--bg); 
        color: var(--text); 
        margin: 0; 
        height: 100dvh; 
        display: flex; 
        overflow: hidden;
    }

    /* Сайдбар */
    #sidebar {
        width: 300px; 
        min-width: 300px; 
        background: #0f172a;
        border-right: 1px solid var(--glass-border);
        display: flex; 
        flex-direction: column; 
        z-index: 2000; 
        transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    @media (max-width: 768px) {
        #sidebar { 
            position: absolute; 
            height: 100%; 
            transform: translateX(-100%); 
            width: 85%; 
        }
        #sidebar.open { 
            transform: translateX(0); 
            box-shadow: 20px 0 60px rgba(0,0,0,0.8); 
        }
    }

    /* Папки и список чатов */
    .folder-tabs {
        display: flex; gap: 8px; padding: 15px; overflow-x: auto;
        scrollbar-width: none; border-bottom: 1px solid var(--glass-border);
    }
    .folder-tab {
        padding: 7px 15px; font-size: 13px; border-radius: 18px;
        background: var(--glass); cursor: pointer; white-space: nowrap;
        opacity: 0.6; transition: 0.2s; border: 1px solid transparent;
    }
    .folder-tab.active { background: var(--accent); opacity: 1; color: white; }

    #chat-items-container { flex: 1; overflow-y: auto; padding: 10px; }
    
    .nav-item {
        padding: 12px 15px; border-radius: 14px; cursor: pointer;
        display: flex; align-items: center; gap: 12px; transition: 0.2s;
        margin-bottom: 4px;
    }
    .nav-item.active { background: rgba(0, 122, 255, 0.15); border-left: 3px solid var(--accent); }

    /* Хедер */
    #main { 
        flex: 1; 
        display: flex; 
        flex-direction: column; 
        position: relative; 
        background: #0f172a; 
    }

    #header {
        padding: 10px 15px;
        padding-top: max(10px, env(safe-area-inset-top)); /* Фикс под челку iPhone */
        border-bottom: 1px solid var(--glass-border);
        display: flex; 
        justify-content: space-between; 
        align-items: center;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        z-index: 1000;
    }

    .header-info { display: flex; align-items: center; gap: 10px; overflow: hidden; }

    /* Аватарки */
    .msg-avatar, #chat-header-avatar, .u-avatar { 
        width: 36px; height: 36px; border-radius: 50%; 
        flex-shrink: 0; background-color: var(--accent);
        background-size: cover; background-position: center;
        display: flex; align-items: center; justify-content: center;
        font-weight: bold; font-size: 14px; color: white;
    }

    /* Сообщения */
    #messages { 
        flex: 1; 
        overflow-y: auto; 
        padding: 15px; 
        display: flex; 
        flex-direction: column; 
        gap: 12px;
        padding-bottom: 100px; /* Чтобы инпут не перекрывал */
    }

    .msg-row { display: flex; gap: 10px; align-items: flex-end; max-width: 85%; }
    .msg-row.me { flex-direction: row-reverse; align-self: flex-end; }

    .bubble {
        padding: 10px 14px; border-radius: 18px; font-size: 15px;
        line-height: 1.4; position: relative; word-wrap: break-word;
    }
    .me .bubble { background: var(--my-bubble); color: white; border-bottom-right-radius: 4px; }
    .other .bubble { background: var(--other-bubble); color: white; border-bottom-left-radius: 4px; border: 1px solid var(--glass-border); }

    .msg-meta { font-size: 11px; opacity: 0.5; margin-bottom: 4px; padding: 0 5px; }

    /* Поле ввода */
    #footer {
        position: absolute; 
        bottom: 0; 
        width: 100%;
        padding: 10px 15px;
        padding-bottom: max(15px, env(safe-area-inset-bottom)); /* Фикс под полоску iPhone */
        background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(20px);
        border-top: 1px solid var(--glass-border);
        display: flex; 
        align-items: center; 
        gap: 10px;
    }

    #mInput {
        flex: 1; background: var(--glass); border: 1px solid var(--glass-border);
        border-radius: 20px; padding: 10px 15px; color: white; font-size: 16px;
    }

    #sendBtn {
        width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
        border: none; color: white; flex-shrink: 0; cursor: pointer;
    }

    /* Профиль внизу */
    .user-panel {
        padding: 15px; background: rgba(0,0,0,0.2);
        border-top: 1px solid var(--glass-border);
        display: flex; align-items: center; gap: 12px;
    }

    .hidden { display: none !important; }
    .btn-del { background:none; border:1px solid #ef4444; color:#ef4444; border-radius:8px; padding:4px 10px; font-size:12px; }

    #auth-screen {
    /* Фиксируем на весь экран */
    position: fixed; 
    top: 0;
    left: 0;
    width: 100vw;
    height: 100dvh;
    
    /* Красим фон, чтобы чаты не просвечивали */
    background: var(--bg); 
    
    /* Ставим выше всех (даже выше сайдбара и хедера) */
    z-index: 9999; 
    
    /* Центрируем форму внутри */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

/* Когда добавляем класс .hidden, блок должен полностью исчезать */
#auth-screen.hidden {
    display: none !important;
}
</style>
</head>
<body>

<div id="auth-screen">
    <div style="text-align:center; background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid var(--glass-border);">
        <h1 id="auth-title" style="color:var(--accent); margin-bottom:25px;">LiveMes.</h1>
        <input type="email" id="email" placeholder="Email" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; border:none; background:rgba(255,255,255,0.05); color:white;">
        <input type="password" id="pass" placeholder="Пароль" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; border:none; background:rgba(255,255,255,0.05); color:white;">
        <div id="reg-fields" class="hidden">
            <input type="text" id="reg-name" placeholder="Ваше имя" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; border:none; background:rgba(255,255,255,0.05); color:white;">
            <input type="text" id="reg-nick" placeholder="Ваш @ник" style="width:100%; margin-bottom:10px; padding:12px; border-radius:8px; border:none; background:rgba(255,255,255,0.05); color:white;">
        </div>
        <button id="auth-btn" style="width:100%; padding:14px; background:var(--accent); border:none; border-radius:12px; color:white; font-weight:bold; cursor:pointer;">Войти</button>
        <p id="auth-toggle" style="font-size:13px; opacity:0.7; margin-top:20px; cursor:pointer;">Нет аккаунта? <b>Зарегистрироваться</b></p>
    </div>
</div>

<div id="sidebar">
    <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin:0; font-size: 24px; letter-spacing: -1px;">Чаты</h2>
        <button id="addChatBtn" style="background:var(--glass); border:none; color:white; border-radius:50%; width:30px; height:30px; cursor:pointer;">+</button>
    </div>
    <div class="folder-tabs">
        <div class="folder-tab active" data-folder="Все">Все</div>
        <div class="folder-tab" data-folder="Личные">Личные</div>
        <div class="folder-tab" data-folder="Группы">Группы</div>
    </div>
    <div id="active-list" style="flex:1; overflow-y:auto;">
        <div class="nav-item active" id="chat-global"><span>🌐</span> Глобальный чат</div>
        <div class="nav-item" id="chat-saved" style="margin-top: 10px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;"><span>🔖</span> <b>Избранное</b>
</div>
        <div id="chat-items-container"></div>
    </div>
    <div class="user-panel">
        <div class="u-avatar" id="u-avatar">?</div>
        <div style="flex:1">
            <div id="u-name" style="font-weight:bold; font-size:14px;">Загрузка...</div>
            <div id="u-nick" style="font-size:11px; opacity:0.5;">@nick</div>
        </div>
        <button id="logoutBtn" style="background:none; border:none; color:#ef4444; cursor:pointer; font-size:12px;">Выход</button>
    </div>
</div>

<div id="main">
   <div id="header">
    <div style="display:flex; align-items:center; gap:12px;">
        <span id="menuBtn" style="font-size:24px; cursor:pointer;">☰</span>
        <div id="chat-header-avatar" class="msg-avatar" style="width:34px; height:34px; display:none;"></div>
        <div>
            <h3 id="chat-title" style="margin:0; font-size:16px;">LiveMes.💎</h3>
            <div id="chat-status" style="font-size:10px; opacity:0.4;">LiveMes💎</div>
        </div>
    </div>
    <button id="del-btn" class="btn-del hidden">Удалить</button>
</div>
    <div id="messages"></div>
    <div id="footer">
        <input type="text" id="mInput" placeholder="Сообщение...">
        <button id="sendBtn">➔</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        initializeFirestore, persistentLocalCache, persistentMultipleTabManager,
        collection, addDoc, query, onSnapshot, serverTimestamp, doc, getDoc, setDoc, where, deleteDoc, updateDoc 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAF8yT2TZtgJCVjZpsIWusH-25jZh2Cts",
        authDomain: "github-messenger-22bd3.firebaseapp.com",
        projectId: "github-messenger-22bd3",
        storageBucket: "github-messenger-22bd3.firebasedatabase.app",
        messagingSenderId: "367012361010",
        appId: "1:367012361010:web:d02a53013d1e2387d25d2b"
    };

    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, {
        experimentalForceLongPolling: true,
        localCache: persistentLocalCache({tabManager: persistentMultipleTabManager()})
    });
    const auth = getAuth(app);

    // Глобальные переменные состояния
    let user = null, myNick = "", myName = "", myAvatar = "", currentChatId = "global", unsubMsgs = null, currentFolder = "Все", allChats = [], isRegMode = false;

    // --- Утилиты ---
    const parseMD = (t) => t.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>').replace(/__(.*?)__/g, '<u>$1</u>').replace(/`(.*?)`/g, '<code>$1</code>');
    const formatTime = (ts) => ts ? ts.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

    const updateUI = (data) => {
        document.getElementById('u-name').innerText = data.name || "Пользователь";
        document.getElementById('u-nick').innerText = "@" + (data.username || "user");
        myAvatar = data.avatar || "";
        const av = document.getElementById('u-avatar');
        if(myAvatar) { 
            av.style.backgroundImage = `url('${myAvatar}')`; 
            av.innerText = ""; 
        } else { 
            av.style.backgroundImage = "none"; 
            av.innerText = (data.name ? data.name[0] : "?").toUpperCase(); 
        }
    };

    // --- Авторизация ---
    onAuthStateChanged(auth, async (u) => {
        if (u) {
            user = u; 
            document.getElementById('auth-screen').classList.add('hidden');
            const snap = await getDoc(doc(db, "users", u.uid));
            if (snap.exists()) {
                const d = snap.data(); 
                myNick = d.username; 
                myName = d.name;
                updateUI(d); 
                loadSidebar(); 
                switchChat('global', 'Глобальный чат');
            }
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
        }
    });

    // --- Логика сообщений ---
    const sendMsg = async () => {
        const input = document.getElementById('mInput');
        const val = input.value.trim();
        if (!val || !user) return;

        // Предварительная очистка поля для предотвращения дублей
        input.value = "";

        try {
            await addDoc(collection(db, "messages"), {
                chatId: currentChatId, 
                text: val, 
                uid: user.uid,
                senderName: myName, 
                senderNick: myNick, 
                senderAvatar: myAvatar, // Используем актуальную аву из переменной
                createdAt: serverTimestamp(), 
                read: false
            });
        } catch(e) {
            console.error("Ошибка при отправке:", e);
            input.value = val; // Возвращаем текст в случае ошибки
        }
    };

const switchChat = async (id, title) => {
        currentChatId = id;
        const headerTitle = document.getElementById('chat-title');
        const headerAv = document.getElementById('chat-header-avatar');
        
        headerTitle.innerText = title;
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('del-btn').classList.toggle('hidden', id === 'global');
   // 1. ОСТАНАВЛИВАЕМ старую подписку, если она была
        if (unsubMsgs) {
            unsubMsgs();
            unsubMsgs = null; 
        }

        currentChatId = id;
        const box = document.getElementById('messages');
        
        // 2. ОЧИЩАЕМ экран немедленно, чтобы не видеть хвосты старого чата
        box.innerHTML = `<div style="text-align:center; opacity:0.5; margin-top:20px;">Загрузка сообщений...</div>`;
      // 3. ЗАПУСКАЕМ новую подписку
        unsubMsgs = onSnapshot(query(collection(db, "messages"), where("chatId", "==", id)), (snap) => {
            // Снова чистим перед рендером новых данных из Snap
            box.innerHTML = ""; 
            
            let msgs = snap.docs.map(d => ({id: d.id, ...d.data()}))
                           .sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
            
            if (msgs.length === 0) {
                box.innerHTML = `<div style="text-align:center; opacity:0.3; margin-top:20px;">Здесь пока пусто...</div>`;
            }

        
        document.getElementById('chat-title').innerText = title;
        // Логика аватарки в хедере
        if (id === 'global') {
            headerAv.style.display = "none"; // В глобале аву не кажем (там много людей)
        } else {
            headerAv.style.display = "flex";
            headerAv.style.backgroundImage = "none";
            headerAv.innerText = title[0].toUpperCase(); // Ставим первую букву по дефолту

            // Пытаемся найти фото собеседника в базе, если это личка
            const chatObj = allChats.find(c => c.id === id);
            if (chatObj && !chatObj.isGroup) {
                const partnerNick = chatObj.users.find(u => u !== myNick.toLowerCase());
                // Ищем юзера по нику, чтобы взять его актуальную аву
                const userQuery = query(collection(db, "users"), where("username", "==", partnerNick));
                onSnapshot(userQuery, (uSnap) => {
                    if (!uSnap.empty) {
                        const uData = uSnap.docs[0].data();
                        if (uData.avatar) {
                            headerAv.style.backgroundImage = `url('${uData.avatar}')`;
                            headerAv.innerText = "";
                        }
                    }
                });
            } else if (chatObj && chatObj.isGroup) {
                headerAv.innerText = "👥"; // Для групп ставим иконку
            }
        }

        // --- Дальше старый код подписки на сообщения без изменений ---
        if (unsubMsgs) unsubMsgs();
        unsubMsgs = onSnapshot(query(collection(db, "messages"), where("chatId", "==", id)), (snap) => {
            const box = document.getElementById('messages');
            let msgs = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
            box.innerHTML = "";
            
            msgs.forEach(m => {
                const isMe = m.uid === user?.uid;
                const photoUrl = m.senderAvatar && m.senderAvatar.trim() !== "" ? m.senderAvatar : null;
                let avStyle = photoUrl ? `background-image: url('${photoUrl}'); background-size: cover; background-position: center;` : `background-color: var(--accent);`;
                let avContent = photoUrl ? "" : (m.senderName ? m.senderName[0] : "?").toUpperCase();
                const pointer = !isMe ? 'cursor: pointer;' : 'cursor: default;';

                box.innerHTML += `
                    <div class="msg-row ${isMe ? 'me' : 'other'}">
                        <div class="msg-avatar" style="${avStyle} ${pointer}" onclick="${!isMe ? `window.openPrivateChat('${m.senderNick}', '${m.senderName}')` : ''}">${avContent}</div>
                        <div class="msg-content">
                            <div class="msg-meta"><b>${m.senderNick === 'timon' ? '⭐ ' : ''}${m.senderName}</b> • ${formatTime(m.createdAt)}</div>
                            <div class="bubble">${parseMD(m.text || "")}${isMe ? `<span style="font-size:10px; margin-left:5px; opacity:0.7;">${m.read ? '✓✓' : '✓'}</span>` : ''}</div>
                        </div>
                    </div>`;
                if (!isMe && !m.read && currentChatId !== 'global') updateDoc(doc(db, "messages", m.id), { read: true });
            });
            box.scrollTop = box.scrollHeight;
        });
    };
    window.openPrivateChat = async (targetNick, targetName) => {
        if (!targetNick || targetNick === myNick) return;

        const lowerMyNick = myNick.toLowerCase();
        const lowerTargetNick = targetNick.toLowerCase();

        // 1. Ищем, существует ли уже такой чат
        const existingChat = allChats.find(c => 
            !c.isGroup && 
            c.users.includes(lowerMyNick) && 
            c.users.includes(lowerTargetNick)
        );

        if (existingChat) {
            // Если чат есть — просто переходим
            switchChat(existingChat.id, "@" + targetNick);
        } else {
            // 2. Если чата нет — создаем новый
            if (confirm(`Открыть личные сообщения с ${targetName}?`)) {
                try {
                    const newChatRef = await addDoc(collection(db, "chats"), {
                        name: "", 
                        users: [lowerMyNick, lowerTargetNick], 
                        isGroup: false,
                        createdAt: serverTimestamp()
                    });
                    // Переходим в только что созданный чат
                    switchChat(newChatRef.id, "@" + targetNick);
                } catch (e) {
                    console.error("Ошибка создания чата:", e);
                }
            }
        }
    };

    // --- Сайдбар и папки ---
    const loadSidebar = () => {
        onSnapshot(query(collection(db, "chats"), where("users", "array-contains", myNick.toLowerCase())), (snap) => {
            allChats = snap.docs.map(d => ({id: d.id, ...d.data()})); 
            renderChats();
        });
    };

const renderChats = () => {
        const container = document.getElementById('chat-items-container');
        const globalBtn = document.getElementById('chat-global');
        
        // 1. Управляем подсветкой Глобального чата
        if (currentChatId === 'global') {
            globalBtn.classList.add('active');
        } else {
            globalBtn.classList.remove('active');
        }

        container.innerHTML = "";
        let filtered = allChats;
        
        if (currentFolder === "Личные") filtered = allChats.filter(c => !c.isGroup);
        if (currentFolder === "Группы") filtered = allChats.filter(c => c.isGroup);
        
        filtered.forEach(chat => {
            const title = chat.isGroup ? chat.name : "@" + (chat.users.find(u => u !== myNick.toLowerCase()) || "Чат");
            
            const div = document.createElement('div');
            // 2. ГЛАВНЫЙ ФИКС: Проверяем актуальный ID
            div.className = `nav-item ${currentChatId === chat.id ? 'active' : ''}`;
            
            div.innerHTML = `<span>${chat.isGroup ? '👥' : '💬'}</span> ${title}`;
            div.onclick = () => {
                // Сначала визуально меняем класс, чтобы отклик был мгновенным
                document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
                div.classList.add('active');
                switchChat(chat.id, title);
            };
            container.appendChild(div);
        });
    };

    // --- Обработчики событий ---
    document.getElementById('sendBtn').onclick = sendMsg;
    document.getElementById('mInput').onkeydown = (e) => { if(e.key === 'Enter') sendMsg(); };

    document.getElementById('auth-btn').onclick = async () => {
        const m = document.getElementById('email').value, p = document.getElementById('pass').value;
        try {
            if(isRegMode) {
                const res = await createUserWithEmailAndPassword(auth, m, p);
                await setDoc(doc(db, "users", res.user.uid), { 
                    name: document.getElementById('reg-name').value, 
                    username: document.getElementById('reg-nick').value.trim().toLowerCase(), 
                    avatar: "" 
                });
            } else {
                await signInWithEmailAndPassword(auth, m, p);
            }
        } catch(e) { alert(e.message); }
    };

    document.getElementById('auth-toggle').onclick = () => { 
        isRegMode = !isRegMode; 
        document.getElementById('reg-fields').classList.toggle('hidden', !isRegMode); 
        document.getElementById('auth-btn').innerText = isRegMode ? "Создать аккаунт" : "Войти";
    };

    document.getElementById('u-avatar').onclick = async () => {
        const n = prompt("Новое имя:", myName); 
        const a = prompt("Ссылка на аватарку:", myAvatar);
        if(n !== null || a !== null) {
            const updateData = {};
            if (n) updateData.name = n;
            if (a !== null) updateData.avatar = a;
            await updateDoc(doc(db, "users", user.uid), updateData);
            // Принудительно обновляем локальную переменную, чтобы авы в новых сообщениях сразу работали
            if (a !== null) myAvatar = a;
            if (n) myName = n;
        }
    };

    document.querySelectorAll('.folder-tab').forEach(t => t.onclick = () => {
        document.querySelectorAll('.folder-tab').forEach(f => f.classList.remove('active'));
        t.classList.add('active'); 
        currentFolder = t.dataset.folder; 
        renderChats();
    });

    document.getElementById('addChatBtn').onclick = async () => {
        const g = confirm("Группа?"); 
        const t = prompt("Ник/Название:");
        if(t) await addDoc(collection(db, "chats"), { 
            name: g?t:"", 
            users: [myNick.toLowerCase(), ...(g?[]:[t.toLowerCase()])], 
            isGroup: g 
        });
    };

    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
    document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('chat-global').onclick = () => {
        // Снимаем активный класс со всех и ставим Глобальному
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        document.getElementById('chat-global').classList.add('active');
        switchChat('global', 'Глобальный чат');
    };    document.getElementById('del-btn').onclick = async () => { 
        if(confirm("Удалить этот чат?")) { 
            await deleteDoc(doc(db, "chats", currentChatId)); 
            switchChat('global', 'Глобальный чат'); 
        } 
    };
    document.getElementById('chat-saved').onclick = async () => {
        const lowerMyNick = myNick.toLowerCase();
        
        // Ищем чат, где в массиве users только ТЫ один
        let savedChat = allChats.find(c => 
            !c.isGroup && 
            c.users.length === 1 && 
            c.users[0] === lowerMyNick
        );

        if (savedChat) {
            switchChat(savedChat.id, "Избранное");
        } else {
            // Если такого чата еще нет (первый раз нажали), создаем его
            try {
                const newChatRef = await addDoc(collection(db, "chats"), {
                    name: "Избранное",
                    users: [lowerMyNick],
                    isGroup: false,
                    isSaved: true, // Доп. флаг для удобства
                    createdAt: serverTimestamp()
                });
                switchChat(newChatRef.id, "Избранное");
            } catch (e) {
                console.error("Ошибка при создании Избранного:", e);
            }
        }
    };
    
</script>
</body>
</html>
