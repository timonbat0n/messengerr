<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LiveMes. Pro Max</title>
    <style>
        :root { 
            --accent: #007AFF; --bg: #f2f2f7; --glass: rgba(255, 255, 255, 0.9); 
            --border: rgba(0, 0, 0, 0.08); --text: #000; --bubble-other: #fff;
        }
        [data-theme="dark"] {
            --bg: #000; --glass: rgba(28, 28, 30, 0.95); --border: rgba(255, 255, 255, 0.1); 
            --text: #fff; --bubble-other: #1c1c1e;
        }
        
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100dvh; display: flex; transition: 0.3s; overflow: hidden; }

        /* Папки чатов */
        .folder-tabs { display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); background: var(--glass); }
        .folder-tabs::-webkit-scrollbar { display: none; }
        .folder-tab { padding: 6px 14px; font-size: 13px; border-radius: 15px; cursor: pointer; white-space: nowrap; background: rgba(0,0,0,0.05); opacity: 0.7; transition: 0.2s; }
        .folder-tab.active { background: var(--accent); color: #fff; opacity: 1; }

        #sidebar { 
            width: 280px; background: var(--glass); border-right: 1px solid var(--border); 
            backdrop-filter: blur(20px); display: flex; flex-direction: column; z-index: 100;
            transition: transform 0.3s ease;
        }
        
        @media (max-width: 768px) {
            #sidebar { position: absolute; height: 100%; transform: translateX(-100%); width: 85%; }
            #sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.3); }
        }

        #active-list { flex: 1; overflow-y: auto; padding: 10px; }
        .sidebar-label { margin: 10px 0 5px 5px; font-size: 10px; opacity: 0.4; text-transform: uppercase; font-weight: bold; }
        .nav-item { padding: 12px; border-radius: 12px; cursor: pointer; font-size: 15px; transition: 0.2s; margin-bottom: 2px; }
        .nav-item.active { background: var(--accent); color: #fff; }

        #main { flex: 1; display: flex; flex-direction: column; height: 100dvh; position: relative; overflow: hidden; }
        #header { padding: 12px 15px; border-bottom: 1px solid var(--border); background: var(--glass); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: space-between; }

        .pinned-bar { background: var(--glass); border-bottom: 1px solid var(--border); padding: 8px 15px; display: flex; align-items: center; justify-content: space-between; font-size: 13px; }
        .pin-line { border-left: 2px solid var(--accent); padding-left: 10px; }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .bubble b { font-weight: bold; }
        .bubble code { background: rgba(0,0,0,0.1); padding: 2px 4px; border-radius: 4px; font-family: monospace; }

        /* Контекстное меню кнопки */
        #send-ctx-menu { 
            position: absolute; bottom: 75px; right: 15px; background: var(--glass); 
            backdrop-filter: blur(25px); border-radius: 16px; border: 1px solid var(--border);
            display: none; flex-direction: column; width: 200px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 2000;
        }
        .ctx-item { padding: 14px 18px; cursor: pointer; font-size: 14px; border-bottom: 1px solid var(--border); }
        .ctx-item:last-child { border: none; }

        #footer { padding: 10px 15px; background: var(--glass); border-top: 1px solid var(--border); padding-bottom: calc(12px + env(safe-area-inset-bottom)); display: flex; gap: 10px; align-items: center; }
        .input-wrap { flex: 1; background: rgba(0,0,0,0.05); border-radius: 22px; display: flex; padding: 2px 14px; align-items: center; border: 1px solid var(--border); }
        #mInput { flex: 1; border: none; outline: none; background: none; color: inherit; padding: 12px; font-size: 16px; }

        /* Модалки */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 3000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--glass); padding: 30px; border-radius: 28px; width: 100%; max-width: 320px; text-align: center; border: 1px solid var(--border); }
        .card input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin: 8px 0; box-sizing: border-box; background: rgba(0,0,0,0.02); color: inherit; }
        .card button { width: 100%; padding: 12px; border-radius: 10px; background: var(--accent); color: #fff; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .hidden { display: none !important; }
    </style>
</head>
<body data-theme="light">

    <div id="auth-screen" class="modal">
        <div class="card">
            <h1 style="color:var(--accent)">LiveMes.</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button id="loginBtn">Войти</button>
            <p id="regBtn" style="font-size:12px; opacity:0.5; cursor:pointer; margin-top:15px;">Создать аккаунт</p>
        </div>
    </div>

    <div id="profile-screen" class="modal hidden">
        <div class="card">
            <h2>Профиль</h2>
            <input type="text" id="pName" placeholder="Имя">
            <input type="text" id="pNick" placeholder="Ник (напр. timon)">
            <button id="saveProfBtn">Готово</button>
        </div>
    </div>

    <div id="sidebar">
        <div style="padding: 15px; display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0;">LiveMes.</h2>
            <button onclick="document.body.setAttribute('data-theme', document.body.getAttribute('data-theme')==='light'?'dark':'light')" style="background:none; border:none; font-size:20px;">🌓</button>
        </div>

        <div class="folder-tabs">
            <div class="folder-tab active" onclick="setFolder('Все', this)">Все</div>
            <div class="folder-tab" onclick="setFolder('Личные', this)">Личные</div>
            <div class="folder-tab" onclick="setFolder('Группы', this)">Группы</div>
        </div>
        
        <div id="active-list">
            <div class="nav-item active" id="chat-global" onclick="switchChat('global', 'Глобальный чат')">🌐 Глобальный чат</div>
            <div class="sidebar-label">Сообщения</div>
            <div id="dm-list"></div>
            <div id="group-list"></div>
        </div>
    </div>

    <div id="main">
        <div id="header">
            <div style="display:flex; align-items:center; gap:12px;">
                <span onclick="document.getElementById('sidebar').classList.toggle('open')" style="font-size:24px; cursor:pointer;">☰</span>
                <div>
                    <h3 id="chat-title" style="margin:0; font-size:17px;">LiveMes.</h3>
                    <span style="font-size:10px; opacity:0.5;">⏲ автоудаление выкл.</span>
                </div>
            </div>
            <button id="clearBtn" class="hidden" style="background:none; border:none; font-size:20px;">🧹</button>
        </div>

        <div class="pinned-bar">
            <div class="pin-line">
                <div style="color:var(--accent); font-weight:bold; font-size:11px;">Закреплено</div>
                <div id="pin-text" style="opacity:0.7; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px;">Добро пожаловать в Pro Max!</div>
            </div>
        </div>
        
        <div id="messages"></div>

        <div id="send-ctx-menu">
            <div class="ctx-item" onclick="handleAction('silent')">🔇 Без звука</div>
            <div class="ctx-item" onclick="handleAction('later')">🕒 Позже</div>
            <div class="ctx-item" onclick="document.getElementById('send-ctx-menu').style.display='none'" style="color:red">Отмена</div>
        </div>

        <div id="footer">
            <div class="input-wrap">
                <input type="text" id="mInput" placeholder="Сообщение..." autocomplete="off">
                <button id="sendBtn" style="background:none; border:none; color:var(--accent); font-size:26px; cursor:pointer;">➔</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAF8yT2TZtgJCVjZpsIWusH-25jZh2Cts",
        authDomain: "github-messenger-22bd3.firebaseapp.com",
        projectId: "github-messenger-22bd3",
        appId: "1:367012361010:web:d02a53013d1e2387d25d2b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    onAuthStateChanged(auth, (u) => {
        if (u) console.log("FIREBASE OK: Юзер зашел как", u.email);
        else console.log("FIREBASE OK: Жду логина...");
    });
</script>
</body>
</html>
