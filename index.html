<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LiveMes.</title>
<style>
    :root {
        --accent: #007AFF;
        --bg: #0f172a;
        --glass: rgba(255, 255, 255, 0.05);
        --glass-border: rgba(255, 255, 255, 0.1);
        --text: #f8fafc;
        --my-bubble: linear-gradient(135deg, #007AFF, #0051a8);
    }

    * { box-sizing: border-box; }

    body { 
        font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
        background: var(--bg); color: var(--text); 
        margin: 0; height: 100dvh; display: flex; overflow: hidden;
    }

    /* Экран авторизации */
    #auth-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--bg); z-index: 2000;
        display: flex; justify-content: center; align-items: center;
    }
    #auth-screen.hidden { display: none !important; }

    /* САЙДБАР - ИСПРАВЛЕНО */
    #sidebar {
        width: 300px; min-width: 300px; background: rgba(15, 23, 42, 0.95);
        backdrop-filter: blur(20px); border-right: 1px solid var(--glass-border);
        display: flex; flex-direction: column; z-index: 100; transition: 0.3s;
    }
    
    @media (max-width: 768px) {
        #sidebar { position: absolute; height: 100%; transform: translateX(-100%); width: 85%; }
        #sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
    }

    /* Шапка сайдбара */
    .sidebar-header {
        padding: 20px 15px 10px;
        display: flex; justify-content: space-between; align-items: center;
    }
    .sidebar-header h2 { margin: 0; font-size: 22px; }

    /* ТАБЫ - ИСПРАВЛЕНО */
    .folder-tabs {
        display: flex; gap: 8px; padding: 10px 15px; overflow-x: auto;
        scrollbar-width: none; border-bottom: 1px solid var(--glass-border);
    }
    .folder-tabs::-webkit-scrollbar { display: none; }
    
    .folder-tab {
        padding: 6px 14px; font-size: 13px; border-radius: 15px;
        background: var(--glass); cursor: pointer; white-space: nowrap;
        border: 1px solid var(--glass-border); opacity: 0.7; transition: 0.2s;
    }
    .folder-tab.active { background: var(--accent); opacity: 1; border-color: transparent; }

    /* СПИСОК ЧАТОВ */
    #chat-items-container {
        flex: 1; overflow-y: auto; padding: 10px;
        display: flex; flex-direction: column; gap: 4px;
    }
    .nav-item {
        padding: 12px 15px; border-radius: 12px; cursor: pointer;
        transition: 0.2s; display: flex; align-items: center; gap: 12px;
    }
    .nav-item:hover { background: var(--glass); }
    .nav-item.active { background: rgba(0, 122, 255, 0.15); border: 1px solid var(--accent); }

    /* ПАНЕЛЬ ЮЗЕРА - ПРИБИТА К НИЗУ */
    .user-panel {
        padding: 15px; background: rgba(0,0,0,0.2);
        border-top: 1px solid var(--glass-border);
        display: flex; align-items: center; gap: 12px;
    }
    .u-avatar { 
        width: 35px; height: 35px; border-radius: 50%; 
        background: var(--accent); display: flex; 
        align-items: center; justify-content: center; 
        font-weight: bold; font-size: 14px; flex-shrink: 0;
    }
    .u-info { flex: 1; overflow: hidden; line-height: 1.2; }
    .u-info div:first-child { font-weight: 600; font-size: 14px; }
    .u-info div:last-child { font-size: 11px; opacity: 0.5; }
    
    #logoutBtn { 
        color: #ff453a; font-size: 13px; cursor: pointer; 
        background: none; border: none; padding: 5px;
    }

    /* ГЛАВНОЕ ОКНО */
    #main { 
        flex: 1; display: flex; flex-direction: column; 
        background: radial-gradient(circle at 50% 0%, #1e293b, #0f172a); 
        position: relative; 
    }

    #header {
        padding: 15px 20px; border-bottom: 1px solid var(--glass-border);
        display: flex; justify-content: space-between; align-items: center;
        backdrop-filter: blur(10px); background: rgba(15, 23, 42, 0.4);
    }

    #messages { 
        flex: 1; overflow-y: auto; padding: 20px; 
        display: flex; flex-direction: column; gap: 12px; 
        scroll-behavior: smooth; padding-bottom: 100px;
    }

    /* ФУТЕР - ФИКС КЛИКОВ */
    #footer {
        position: absolute; bottom: 0; left: 0; width: 100%;
        display: flex; align-items: center; gap: 10px;
        padding: 15px 20px; background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(15px); border-top: 1px solid var(--glass-border);
        z-index: 1000;
    }

    #mInput {
        flex: 1; background: var(--glass); border: 1px solid var(--glass-border);
        border-radius: 20px; padding: 12px 20px; color: #fff;
        font-size: 15px; outline: none; transition: 0.3s;
    }
    #mInput:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }

    #sendBtn {
        background: var(--accent); color: white; border: none;
        width: 40px; height: 40px; border-radius: 50%;
        cursor: pointer; font-size: 18px; flex-shrink: 0;
        display: flex; align-items: center; justify-content: center;
    }

    .hidden { display: none !important; }
</style>
</head>
<body>

<div id="auth-screen" class="modal">
    <div class="card">
        <h1 id="auth-title" style="color:var(--accent); margin-bottom:25px;">LiveMes.</h1>
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="pass" placeholder="Пароль">
        <div id="reg-fields" class="hidden">
            <input type="text" id="reg-name" placeholder="Ваше имя">
            <input type="text" id="reg-nick" placeholder="Ваш @ник">
        </div>
        <button id="auth-btn" style="width:100%; padding:14px; background:var(--accent); border:none; border-radius:12px; color:white; font-weight:bold; cursor:pointer; margin-top:10px;">Войти</button>
        <p id="auth-toggle" style="font-size:13px; opacity:0.7; margin-top:20px; cursor:pointer;">
            Нет аккаунта? <b>Зарегистрироваться</b>
        </p>
    </div>
</div>

<div id="sidebar">
    <div style="padding: 20px; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin:0; font-size: 24px; letter-spacing: -1px;">Чаты</h2>
        <button class="btn-action" id="addChatBtn">+</button>
    </div>
    <div class="folder-tabs">
        <div class="folder-tab active" id="folder-all">Все</div>
        <div class="folder-tab" id="folder-priv">Личные</div>
        <div class="folder-tab" id="folder-groups">Группы</div>
    </div>
    <div id="active-list">
        <div class="nav-item active" id="chat-global">
            <span style="font-size:18px;">🌐</span> Глобальный чат
        </div>
        <div id="chat-items-container"></div>
    </div>
    <div class="user-panel">
        <div class="u-avatar" id="u-avatar">?</div>
        <div style="flex:1">
            <div id="u-name" style="font-weight:bold; font-size:14px;">Загрузка...</div>
            <div id="u-nick" style="font-size:11px; opacity:0.5;">@nick</div>
        </div>
        <button id="logoutBtn" style="background:none; border:none; color:#ef4444; cursor:pointer; font-size:12px;">Выход</button>
    </div>
</div>

<div id="main">
    <div id="header">
        <div style="display:flex; align-items:center; gap:15px;">
            <span id="menuBtn" style="font-size:24px; cursor:pointer;">☰</span>
            <div>
                <h3 id="chat-title" style="margin:0; font-size:18px;">LiveMes. Elite</h3>
                <div id="chat-status" style="font-size:10px; opacity:0.4;">выберите диалог</div>
            </div>
        </div>
        <button id="del-btn" class="btn-del hidden">Удалить</button>
    </div>
    <div id="messages"></div>
   <div id="footer">
    <input type="text" id="mInput" placeholder="Сообщение...">
    <button id="sendBtn">➔</button>
   </div>
</div>
</div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { 
        initializeFirestore, 
        persistentLocalCache, 
        persistentMultipleTabManager,
        collection, addDoc, query, onSnapshot, serverTimestamp, doc, getDoc, setDoc, where, deleteDoc 
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAF8yT2TZtgJCVjZpsIWusH-25jZh2Cts",
        authDomain: "github-messenger-22bd3.firebaseapp.com",
        databaseURL: "https://github-messenger-22bd3-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "github-messenger-22bd3",
        storageBucket: "github-messenger-22bd3.firebasedatabase.app",
        messagingSenderId: "367012361010",
        appId: "1:367012361010:web:d02a53013d1e2387d25d2b"
    };

    // 1. Инициализация
    const app = initializeApp(firebaseConfig);
    const db = initializeFirestore(app, {
        experimentalForceLongPolling: true, // ФИКС OFFLINE ОШИБКИ
        localCache: persistentLocalCache({tabManager: persistentMultipleTabManager()})
    });
    const auth = getAuth(app);

    // ОБЪЯВЛЯЕМ ПЕРЕМЕННЫЕ (Без них код выдает ошибку ReferenceError)
    let user = null;
    let myNick = "";
    let myName = "";
    let currentChatId = "global";
    let unsubscribe = null;
    let currentFolder = "Все";
    let allChats = [];
    let isRegMode = false;

    const parseMD = (t) => t.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>').replace(/`(.*?)`/g, '<code>$1</code>');

    // Обновление интерфейса профиля
    const updateUI = () => {
        const nameEl = document.getElementById('u-name');
        const nickEl = document.getElementById('u-nick');
        const avatarEl = document.getElementById('u-avatar');
        if (nameEl) nameEl.innerText = myName || "Пользователь";
        if (nickEl) nickEl.innerText = "@" + (myNick || "user");
        if (avatarEl) avatarEl.innerText = (myName ? myName[0] : "?").toUpperCase();
    };

    // Следим за состоянием входа
    onAuthStateChanged(auth, async (u) => {
        console.log("Статус входа:", u ? "Вошел" : "Вышел");
        if (u) {
            user = u;
            document.getElementById('auth-screen').classList.add('hidden');
            try {
                const snap = await getDoc(doc(db, "users", u.uid));
                if (snap.exists()) {
                    myNick = snap.data().username;
                    myName = snap.data().name;
                    console.log("Профиль загружен:", myNick);
                } else {
                    console.warn("Профиль не найден, создаем временный...");
                    myNick = u.email.split('@')[0];
                    myName = myNick;
                }
                updateUI();
                loadSidebar();
                switchChat('global', 'Глобальный чат');
            } catch (err) {
                console.error("Ошибка загрузки профиля:", err);
            }
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
        }
    });

    // Авторизация и регистрация
    document.getElementById('auth-btn').onclick = async () => {
        const mail = document.getElementById('email').value;
        const pass = document.getElementById('pass').value;
        if (!mail || !pass) return alert("Заполните поля!");

        try {
            if (isRegMode) {
                const name = document.getElementById('reg-name').value;
                const nick = document.getElementById('reg-nick').value.trim().toLowerCase();
                if (!name || !nick) return alert("Введите имя и ник!");
                const res = await createUserWithEmailAndPassword(auth, mail, pass);
                await setDoc(doc(db, "users", res.user.uid), { name, username: nick });
                location.reload();
            } else {
                await signInWithEmailAndPassword(auth, mail, pass);
            }
        } catch (e) { alert("Ошибка: " + e.message); }
    };

    document.getElementById('auth-toggle').onclick = () => {
        isRegMode = !isRegMode;
        document.getElementById('auth-title').innerText = isRegMode ? "Регистрация" : "LiveMes.";
        document.getElementById('auth-btn').innerText = isRegMode ? "Создать аккаунт" : "Войти";
        document.getElementById('reg-fields').classList.toggle('hidden', !isRegMode);
        document.getElementById('auth-toggle').innerHTML = isRegMode ? "Уже есть аккаунт? <b>Войти</b>" : "Нет аккаунта? <b>Зарегистрироваться</b>";
    };

    // Работа с чатами
    const loadSidebar = () => {
        if (!myNick) return;
        const q = query(collection(db, "chats"), where("users", "array-contains", myNick.toLowerCase()));
        onSnapshot(q, (snap) => {
            allChats = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderChats();
        });
    };

    const renderChats = () => {
        const container = document.getElementById('chat-items-container');
        if (!container) return;
        container.innerHTML = "";
        let filtered = allChats;
        if (currentFolder === "Личные") filtered = allChats.filter(c => !c.isGroup);
        if (currentFolder === "Группы") filtered = allChats.filter(c => c.isGroup);

        filtered.forEach(chat => {
            const other = chat.users.find(u => u !== myNick.toLowerCase());
            const title = chat.isGroup ? chat.name : "@" + (other || "Чат");
            const div = document.createElement('div');
            div.className = `nav-item ${currentChatId === chat.id ? 'active' : ''}`;
            div.innerHTML = `<span style="font-size:18px;">${chat.isGroup ? '👥' : '💬'}</span> ${title}`;
            div.onclick = () => switchChat(chat.id, title);
            container.appendChild(div);
        });
    };

    const switchChat = (id, title) => {
        currentChatId = id;
        document.getElementById('chat-title').innerText = title;
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('del-btn').classList.toggle('hidden', id === 'global');
        
        if (unsubscribe) unsubscribe();
        const q = query(collection(db, "messages"), where("chatId", "==", id));
        unsubscribe = onSnapshot(q, (snap) => {
            const box = document.getElementById('messages');
            let msgs = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
            box.innerHTML = "";
            msgs.forEach(m => {
                const isMe = m.uid === user?.uid;
                box.innerHTML += `
                    <div style="align-self:${isMe?'flex-end':'flex-start'}; max-width:85%;">
                        <div style="font-size:10px; opacity:0.4; margin-bottom:2px; text-align:${isMe?'right':'left'}">
                            ${m.senderNick === 'timon' ? '⭐ ' : ''}${m.senderName}
                        </div>
                        <div class="bubble" style="background:${isMe?'var(--my-bubble)':'var(--glass)'}; color:#fff; border-radius:${isMe?'18px 18px 4px 18px':'18px 18px 18px 4px'};">
                            ${parseMD(m.text || "")}
                        </div>
                    </div>`;
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    // ОТПРАВКА СООБЩЕНИЙ
    window.sendMsg = async () => {
        const input = document.querySelector('#footer #mInput') || document.getElementById('mInput');
        if (!input) return;

        const val = input.value.trim();
        if (!val || !user) return;

        try {
            input.value = "";
            await addDoc(collection(db, "messages"), {
                chatId: currentChatId || "global",
                text: val,
                uid: user.uid,
                senderName: myName || "Аноним",
                senderNick: myNick || "user",
                createdAt: serverTimestamp()
            });
            console.log("✅ Сообщение отправлено");
        } catch (e) {
            console.error("Ошибка отправки:", e);
            input.value = val;
        }
    };

    // Кнопки и навигация
    document.getElementById('sendBtn').onclick = window.sendMsg;
    document.getElementById('mInput').onkeydown = (e) => e.key === 'Enter' && window.sendMsg();
    document.getElementById('logoutBtn').onclick = () => signOut(auth).then(() => location.reload());
    document.getElementById('menuBtn').onclick = () => document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('chat-global').onclick = () => switchChat('global', 'Глобальный чат');

    document.getElementById('folder-all').onclick = () => { currentFolder = "Все"; renderChats(); };
    document.getElementById('folder-priv').onclick = () => { currentFolder = "Личные"; renderChats(); };
    document.getElementById('folder-groups').onclick = () => { currentFolder = "Группы"; renderChats(); };

    document.getElementById('addChatBtn').onclick = async () => {
        const isGroup = confirm("OK - Группа, Отмена - Личный чат");
        if (isGroup) {
            const name = prompt("Название группы:");
            const members = prompt("Ники через запятую:");
            if (!name || !members) return;
            const users = members.split(',').map(m => m.trim().toLowerCase());
            if (!users.includes(myNick.toLowerCase())) users.push(myNick.toLowerCase());
            await addDoc(collection(db, "chats"), { name, users, isGroup: true, owner: myNick });
        } else {
            const target = prompt("Ник пользователя:");
            if (target) await addDoc(collection(db, "chats"), { users: [myNick.toLowerCase(), target.toLowerCase()], isGroup: false });
        }
    };

    document.getElementById('del-btn').onclick = async () => {
        if (currentChatId !== 'global' && confirm("Удалить чат?")) {
            await deleteDoc(doc(db, "chats", currentChatId));
            switchChat('global', 'Глобальный чат');
        }
    };

    window.switchChat = switchChat;
    // Оборачиваем в проверку, чтобы кнопки точно нашлись
const bindEvents = () => {
    const sBtn = document.getElementById('sendBtn');
    const input = document.getElementById('mInput');

    if (sBtn) {
        sBtn.onclick = (e) => {
            e.preventDefault();
            window.sendMsg();
        };
    }

    if (input) {
        input.onkeydown = (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                window.sendMsg();
            }
        };
    }
};

// Запускаем при загрузке
window.addEventListener('DOMContentLoaded', bindEvents);
// И на всякий случай запускаем еще раз после входа
onAuthStateChanged(auth, (u) => {
    if (u) setTimeout(bindEvents, 500); 
});
</script>
</body>
</html>
