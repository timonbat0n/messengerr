<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiveMes. | Cyber-Glass</title>
    <style>
        :root { 
            --accent: #00d2ff; 
            --bg: #05070a; 
            --glass: rgba(255, 255, 255, 0.03); 
            --border: rgba(255, 255, 255, 0.08);
            --font: 'Inter', -apple-system, sans-serif;
        }
        
        body { 
            font-family: var(--font); background: var(--bg); color: #fff; 
            margin: 0; height: 100vh; display: flex; overflow: hidden; 
        }

        /* Sidebar - Ultra Minimal */
        #sidebar { 
            width: 75px; background: rgba(0,0,0,0.4); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; align-items: center; padding: 25px 0; gap: 30px; backdrop-filter: blur(20px);
        }
        .chat-icon { 
            width: 50px; height: 50px; border-radius: 16px; background: var(--glass); 
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-size: 20px;
        }
        .chat-icon:hover { transform: scale(1.1); border-color: var(--accent); color: var(--accent); }
        .chat-icon.active { background: var(--accent); color: #000; border: none; box-shadow: 0 0 20px rgba(0, 210, 255, 0.4); }

        /* Main Content */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; background: radial-gradient(circle at top right, #0a111a, #05070a); }
        
        #header { 
            padding: 20px 25px; background: rgba(5, 7, 10, 0.8); border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px);
        }
        #header h1 { font-size: 1.3em; margin: 0; font-weight: 900; letter-spacing: -0.5px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* Messages Area */
        #messages { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg-row { display: flex; gap: 12px; max-width: 80%; animation: fadeInUp 0.4s ease forwards; opacity: 0; }
        .my-msg { align-self: flex-end; flex-direction: row-reverse; }
        
        .bubble { 
            background: var(--glass); padding: 12px 16px; border-radius: 20px; border: 1px solid var(--border); 
            position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .my-msg .bubble { background: rgba(0, 210, 255, 0.05); border-color: rgba(0, 210, 255, 0.3); }
        .bubble b { color: var(--accent); font-size: 0.75em; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        
        .chat-img { max-width: 100%; border-radius: 14px; margin-top: 10px; border: 1px solid var(--border); display: block; }

        /* Input Bar */
        #footer { padding: 20px; background: transparent; display: flex; gap: 15px; align-items: center; }
        .input-wrapper { 
            flex: 1; background: var(--glass); border: 1px solid var(--border); 
            border-radius: 30px; display: flex; align-items: center; padding: 5px 15px; transition: 0.3s;
        }
        .input-wrapper:focus-within { border-color: var(--accent); background: rgba(255,255,255,0.05); }
        
        #mInput { background: none; border: none; color: #fff; padding: 12px; outline: none; flex: 1; font-size: 15px; }
        .icon-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #555; transition: 0.2s; }
        .icon-btn:hover { color: var(--accent); }

        /* Modals */
        .modal { position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(15px); }
        .card { background: #0a0c10; padding: 40px; border-radius: 35px; border: 1px solid var(--border); width: 300px; text-align: center; }
        .btn-primary { 
            background: var(--accent); color: #000; border: none; padding: 16px; border-radius: 20px; 
            font-weight: 800; width: 100%; cursor: pointer; margin-top: 20px; transition: 0.3s;
        }
        .btn-primary:hover { box-shadow: 0 10px 25px rgba(0, 210, 255, 0.3); transform: translateY(-3px); }

        .hidden { display: none !important; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="username-screen" class="modal hidden">
        <div class="card">
            <h2 style="margin-top:0">LiveMes. <span style="color:var(--accent)">ID</span></h2>
            <input type="text" id="newUsername" placeholder="твой ник" style="width:100%; padding:15px; border-radius:15px; border:1px solid #333; background:#000; color:#fff; text-align:center;">
            <button class="btn-primary" onclick="setupUsername()">АКТИВИРОВАТЬ</button>
        </div>
    </div>

    <div id="auth-screen" class="modal">
        <div class="card">
            <h1>LiveMes<span style="color:var(--accent)">.</span></h1>
            <input type="email" id="email" placeholder="Email" style="width:100%; padding:15px; border-radius:15px; border:1px solid #333; background:#000; color:#fff; margin-bottom:10px;">
            <input type="password" id="pass" placeholder="Password" style="width:100%; padding:15px; border-radius:15px; border:1px solid #333; background:#000; color:#fff;">
            <button class="btn-primary" onclick="login()">ВОЙТИ</button>
            <p onclick="register()" style="color:#444; font-size:0.8em; margin-top:20px; cursor:pointer; text-decoration:underline">Создать аккаунт</p>
        </div>
    </div>

    <div id="sidebar">
        <div class="chat-icon active" id="btn-global" onclick="switchChat('global')">💠</div>
        <div class="chat-icon" onclick="findUser()">🔍</div>
        <div class="chat-icon" onclick="logout()" style="margin-top: auto;">🔌</div>
    </div>

    <div id="main">
        <div id="header">
            <h1>LiveMes.</h1>
            <div id="status" style="font-size:0.7em; color:var(--accent); letter-spacing:1px">ONLINE</div>
        </div>

        <div id="messages"></div>

        <div id="footer">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            <div class="input-wrapper">
                <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📎</button>
                <input type="text" id="mInput" placeholder="Введите сообщение...">
                <button id="sendBtn" class="icon-btn" style="color:var(--accent)">✦</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, setDoc, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAF8yT2TZtgJCVjZpsIWusH-25jZh2Cts",
        authDomain: "github-messenger-22bd3.firebaseapp.com",
        projectId: "github-messenger-22bd3",
        storageBucket: "github-messenger-22bd3.firebasestorage.app",
        messagingSenderId: "367012361010",
        appId: "1:367012361010:web:d02a53013d1e2387d25d2b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let user = null;
    let myNick = "";
    let currentChatId = "global";
    let unsubscribe = null;

    // --- AUTH ---
    window.login = () => signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert(e.message));
    window.register = () => createUserWithEmailAndPassword(auth, email.value, pass.value).then(() => alert("Готово! Теперь войдите."));
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, async (u) => {
        user = u;
        if (user) {
            document.getElementById('auth-screen').classList.add('hidden');
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                myNick = snap.data().username;
                switchChat('global');
            } else {
                document.getElementById('username-screen').classList.remove('hidden');
            }
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
        }
    });

    window.setupUsername = async () => {
        const nick = newUsername.value.trim().toLowerCase();
        if (nick.length < 3) return alert("Слишком коротко");
        await setDoc(doc(db, "users", user.uid), { username: nick, email: user.email });
        myNick = nick;
        document.getElementById('username-screen').classList.add('hidden');
        switchChat('global');
    };

    // --- MESSAGES ---
    const sendMsg = async (text = "", img = "") => {
        if (!user || (!text && !img)) return;
        try {
            await addDoc(collection(db, "messages"), {
                chatId: currentChatId,
                uid: user.uid,
                sender: "@" + myNick,
                text: text,
                img: img,
                createdAt: serverTimestamp()
            });
            mInput.value = "";
        } catch(e) { alert("Ошибка отправки. Возможно, файл слишком большой."); }
    };

    document.getElementById('sendBtn').onclick = () => sendMsg(mInput.value);

    // --- IMAGE TO BASE64 (The Workaround) ---
    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;

        // Ограничиваем размер (Firestore не любит документы > 1MB)
        if (file.size > 800000) return alert("Файл слишком большой! Выбери фото полегче.");

        const reader = new FileReader();
        reader.onloadend = () => {
            sendMsg("", reader.result); // reader.result - это и есть картинка в коде
        };
        reader.readAsDataURL(file);
    };

    function loadMessages() {
        if (unsubscribe) unsubscribe();
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        unsubscribe = onSnapshot(q, (snap) => {
            const box = document.getElementById('messages');
            box.innerHTML = "";
            snap.forEach(dDoc => {
                const d = dDoc.data();
                if (d.chatId !== currentChatId) return;
                const isMe = d.uid === user.uid;
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'my-msg' : ''}`;
                div.innerHTML = `
                    <div class="bubble">
                        <b>${d.sender}</b>
                        ${d.text ? `<div>${d.text}</div>` : ''}
                        ${d.img ? `<img src="${d.img}" class="chat-img" onclick="window.open('${d.img}')">` : ''}
                    </div>
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

    window.switchChat = (id) => { currentChatId = id; loadMessages(); };
    window.findUser = async () => {
        const t = prompt("Ник собеседника:").toLowerCase();
        const dmId = [myNick, t].sort().join("_");
        switchChat(dmId);
    };

</script>
</body>
</html>
