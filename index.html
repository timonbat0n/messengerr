<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LiveMes.</title>
    <style>
        :root { 
            --accent: #007AFF; --bg: #f2f2f7; --glass: rgba(255, 255, 255, 0.85); 
            --border: rgba(0, 0, 0, 0.1); --text: #000; --bubble-my: #007AFF; --bubble-other: #fff;
            --sidebar-w: 300px;
        }
        [data-theme="dark"] {
            --bg: #000; --glass: rgba(28, 28, 30, 0.9); --border: rgba(255, 255, 255, 0.1); 
            --text: #fff; --bubble-other: #1c1c1e;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100dvh; display: flex; transition: background 0.3s; overflow: hidden; }

        /* Sidebar */
        #sidebar { 
            width: var(--sidebar-w); background: var(--glass); border-right: 1px solid var(--border); 
            backdrop-filter: blur(25px); display: flex; flex-direction: column; z-index: 100;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @media (max-width: 768px) {
            #sidebar { position: absolute; height: 100%; transform: translateX(-100%); width: 85%; }
            #sidebar.open { transform: translateX(0); box-shadow: 20px 0 50px rgba(0,0,0,0.2); }
        }

        .sb-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; }
        .search-box { padding: 0 15px 15px; }
        .search-box input { width: 100%; padding: 12px; border-radius: 12px; border: none; background: rgba(0,0,0,0.05); color: inherit; outline: none; font-size: 16px; }
        [data-theme="dark"] .search-box input { background: rgba(255,255,255,0.1); }

        #active-list { flex: 1; overflow-y: auto; padding: 10px; }
        .sidebar-label { margin: 15px 0 8px 10px; font-size: 11px; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .nav-item { padding: 12px 15px; border-radius: 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 4px; transition: 0.2s; }
        .nav-item:hover { background: rgba(0,0,0,0.03); }
        .nav-item.active { background: var(--accent); color: #fff; }

        /* Main Chat */
        #main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; }
        
        #header { 
            padding: 10px 20px; height: 64px; border-bottom: 1px solid var(--border); 
            background: var(--glass); backdrop-filter: blur(15px); 
            display: flex; align-items: center; justify-content: space-between; z-index: 10;
        }

        .chat-info { cursor: pointer; display: flex; flex-direction: column; }
        .chat-info h3 { margin: 0; font-size: 17px; }
        .chat-info span { font-size: 12px; opacity: 0.5; }

        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        
        .msg { display: flex; flex-direction: column; max-width: 75%; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .msg.me { align-self: flex-end; }
        .msg.other { align-self: flex-start; }

        .msg-info { font-size: 11px; opacity: 0.5; margin-bottom: 4px; padding: 0 5px; display: flex; align-items: center; gap: 4px; }
        .bubble { padding: 10px 16px; border-radius: 20px; font-size: 16px; line-height: 1.4; position: relative; box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .me .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: var(--bubble-other); border-bottom-left-radius: 4px; border: 1px solid var(--border); }

        /* Input Area */
        #footer { padding: 10px 20px; background: var(--glass); backdrop-filter: blur(20px); border-top: 1px solid var(--border); padding-bottom: calc(15px + env(safe-area-inset-bottom)); }
        .input-row { display: flex; align-items: center; gap: 12px; background: rgba(0,0,0,0.05); padding: 5px 15px; border-radius: 25px; }
        [data-theme="dark"] .input-row { background: rgba(255,255,255,0.08); }
        #mInput { flex: 1; border: none; background: transparent; color: inherit; padding: 10px 0; font-size: 16px; outline: none; }
        #sendBtn { background: none; border: none; color: var(--accent); font-weight: 700; cursor: pointer; font-size: 16px; }

        /* Modals */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(5px); z-index: 2000; display: flex; align-items: center; justify-content: center; padding: 20px; opacity: 0; pointer-events: none; transition: 0.3s; }
        .modal.active { opacity: 1; pointer-events: auto; }
        .card { background: var(--glass); padding: 25px; border-radius: 30px; width: 100%; max-width: 350px; border: 1px solid var(--border); box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .card h2 { margin-top: 0; }
        .card input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: inherit; outline: none; }
        .card button { width: 100%; padding: 14px; border-radius: 15px; border: none; background: var(--accent); color: #fff; font-weight: 700; margin-top: 10px; cursor: pointer; }

        .member-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
        .btn-mini { padding: 6px 12px; border-radius: 20px; font-size: 11px; background: rgba(0,0,0,0.05); border: none; cursor: pointer; color: var(--accent); font-weight: bold; }

        .hidden { display: none !important; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 95; }
        .overlay.active { display: block; }
    </style>
</head>
<body data-theme="light">

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <div id="profile-modal" class="modal">
        <div class="card">
            <h2>Твой профиль</h2>
            <input type="text" id="pName" placeholder="Твое имя">
            <input type="text" id="pNick" placeholder="Ник (напр. timon)">
            <button onclick="saveProfile()">Начать общение</button>
        </div>
    </div>

    <div id="auth-modal" class="modal">
        <div class="card">
            <h1 style="color:var(--accent); margin-bottom:5px;">LiveMes.</h1>
            <p style="opacity:0.6; margin-bottom:20px;">Новое поколение мессенджера</p>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <button onclick="register()" style="background:none; color:var(--text); opacity:0.6;">Нет аккаунта? Создать</button>
        </div>
    </div>

    <div id="info-modal" class="modal" onclick="closeModal('info-modal')">
        <div class="card" onclick="event.stopPropagation()">
            <h3 id="info-title">Участники</h3>
            <div id="member-list" style="max-height: 300px; overflow-y: auto; text-align: left;"></div>
            <button onclick="clearCurrentChat()" id="adm-clear-btn" style="background:#ff3b30;" class="hidden">🧹 Очистить весь чат</button>
            <button onclick="closeModal('info-modal')" style="background:rgba(0,0,0,0.05); color:var(--text); margin-top:20px;">Закрыть</button>
        </div>
    </div>

    <div id="sidebar">
        <div class="sb-header">
            <h2 style="margin:0; font-size:24px;">LiveMes.</h2>
            <button onclick="toggleTheme()" style="background:none; border:none; font-size:22px; cursor:pointer;">🌓</button>
        </div>
        
        <div class="search-box">
            <input type="text" id="globalSearch" placeholder="Поиск ника или группы..." onkeydown="if(event.key==='Enter') findAny()">
        </div>

        <div id="active-list">
            <div class="nav-item active" id="item-global" onclick="switchChat('global', '🌐 Глобальный чат')">
                <span>🌐</span> <b>Глобальный чат</b>
            </div>
            
            <div class="sidebar-label">Диалоги</div>
            <div id="dm-list"></div>

            <div class="sidebar-label">Группы</div>
            <div id="group-list"></div>
        </div>
    </div>

    <div id="main">
        <div id="header">
            <div style="display:flex; align-items:center; gap:15px;">
                <span onclick="toggleSidebar()" style="font-size:22px; cursor:pointer;">☰</span>
                <div class="chat-info" onclick="openInfo()">
                    <h3 id="chat-title">LiveMes.</h3>
                    <span id="chat-status">нажми для инфо</span>
                </div>
            </div>
        </div>
        
        <div id="messages"></div>

        <div id="footer">
            <div class="input-row">
                <input type="text" id="mInput" placeholder="Ваше сообщение..." autocomplete="off">
                <button id="sendBtn">➔</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc, getDoc, setDoc, updateDoc, arrayUnion, where, getDocs, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAF8yT2TZtgJCVjZpsIWusH-25jZh2Cts",
        authDomain: "github-messenger-22bd3.firebaseapp.com",
        projectId: "github-messenger-22bd3",
        storageBucket: "github-messenger-22bd3.firebasestorage.app",
        messagingSenderId: "367012361010",
        appId: "1:367012361010:web:d02a53013d1e2387d25d2b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let user = null, myNick = "", myName = "", currentChatId = "global", unsubscribe = null, currentGroupData = null;

    window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); };
    window.toggleTheme = () => { const next = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'; document.body.setAttribute('data-theme', next); };
    window.closeModal = (id) => document.getElementById(id).classList.remove('active');

    onAuthStateChanged(auth, async (u) => {
        user = u;
        if (user) {
            closeModal('auth-modal');
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                const d = snap.data(); myNick = d.username; myName = d.name;
                loadLists(); switchChat('global', '🌐 Глобальный чат');
            } else { document.getElementById('profile-modal').classList.add('active'); }
        } else { document.getElementById('auth-modal').classList.add('active'); }
    });

    window.saveProfile = async () => {
        const nick = pNick.value.trim().toLowerCase();
        if (nick.length < 2) return alert("Ник слишком короткий");
        await setDoc(doc(db, "users", user.uid), { username: nick, name: pName.value.trim(), createdAt: serverTimestamp() });
        location.reload();
    };

    window.login = () => signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert("Ошибка входа"));
    window.register = () => createUserWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert("Ошибка регистрации"));

    function loadLists() {
        // Личка
        onSnapshot(query(collection(db, "chats"), where("users", "array-contains", myNick)), (snap) => {
            const list = document.getElementById('dm-list'); list.innerHTML = "";
            snap.forEach(d => {
                const other = d.data().users.find(u => u !== myNick);
                const div = document.createElement('div'); div.className = `nav-item ${currentChatId === d.id ? 'active' : ''}`;
                div.innerHTML = `<span>👤</span> <b>${other}</b>`;
                div.onclick = () => switchChat(d.id, "@" + other);
                list.appendChild(div);
            });
        });
        // Группы
        onSnapshot(query(collection(db, "groups"), where("members", "array-contains", myNick)), (snap) => {
            const list = document.getElementById('group-list'); list.innerHTML = "";
            snap.forEach(d => {
                const g = d.data();
                const div = document.createElement('div'); div.className = `nav-item ${currentChatId === d.id ? 'active' : ''}`;
                div.innerHTML = `<span>👥</span> <b>${g.name}</b>`;
                div.onclick = () => switchChat(d.id, "👥 " + g.name);
                list.appendChild(div);
            });
        });
    }

    window.switchChat = async (id, title) => {
        currentChatId = id;
        document.getElementById('chat-title').innerText = title;
        if (window.innerWidth < 768) toggleSidebar();

        // Проверка админки
        if (id !== 'global' && !id.includes('_')) {
            const gSnap = await getDoc(doc(db, "groups", id));
            currentGroupData = gSnap.data();
        } else { currentGroupData = { admins: ['timon'] }; }

        if (unsubscribe) unsubscribe();
        const q = query(collection(db, "messages"), where("chatId", "==", currentChatId));
        unsubscribe = onSnapshot(q, (snap) => {
            const box = document.getElementById('messages');
            let msgs = []; snap.forEach(docSnap => msgs.push({id: docSnap.id, ...docSnap.data()}));
            msgs.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));
            box.innerHTML = "";
            msgs.forEach(d => {
                const isMe = d.uid === user.uid;
                const isAdm = myNick === 'timon' || currentGroupData?.admins?.includes(myNick);
                const div = document.createElement('div'); div.className = `msg ${isMe ? 'me' : 'other'}`;
                div.innerHTML = `
                    <div class="msg-info">
                        ${d.senderNick === 'timon' ? '<b style="color:#FFD700">★</b>' : ''} ${d.senderName} 
                        ${(isMe || isAdm) ? `<span onclick="deleteMsg('${d.id}')" style="cursor:pointer; margin-left:5px;">✕</span>` : ''}
                    </div>
                    <div class="bubble">${d.text}</div>`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    window.sendMsg = async () => {
        const text = mInput.value.trim(); if (!text || !user) return;
        mInput.value = "";
        await addDoc(collection(db, "messages"), {
            chatId: currentChatId, senderNick: myNick, senderName: myName, uid: user.uid, text, createdAt: serverTimestamp()
        });
    };

    window.deleteMsg = (id) => confirm("Удалить сообщение?") && deleteDoc(doc(db, "messages", id));

    window.openInfo = async () => {
        if (currentChatId === 'global' || currentChatId.includes('_')) {
            alert("Информация доступна только для групп.");
            return;
        }
        const modal = document.getElementById('info-modal');
        const list = document.getElementById('member-list');
        const clearBtn = document.getElementById('adm-clear-btn');
        list.innerHTML = "Загрузка...";
        modal.classList.add('active');

        const gSnap = await getDoc(doc(db, "groups", currentChatId));
        const g = gSnap.data();
        list.innerHTML = "";
        
        const isMeAdmin = myNick === 'timon' || g.admins.includes(myNick);
        if (isMeAdmin) clearBtn.classList.remove('hidden'); else clearBtn.classList.add('hidden');

        g.members.forEach(m => {
            const isTargetAdm = g.admins.includes(m);
            const div = document.createElement('div'); div.className = "member-row";
            div.innerHTML = `
                <span>${isTargetAdm ? '👑' : '👤'} @${m}</span>
                ${(isMeAdmin && !isTargetAdm) ? `<button class="btn-mini" onclick="promote('${m}')">Короновать</button>` : ''}
            `;
            list.appendChild(div);
        });
    };

    window.promote = async (nick) => {
        await updateDoc(doc(db, "groups", currentChatId), { admins: arrayUnion(nick) });
        alert(nick + " теперь админ!");
        openInfo();
    };

    window.clearCurrentChat = async () => {
        if (!confirm("Удалить ВСЕ сообщения в этом чате?")) return;
        const q = query(collection(db, "messages"), where("chatId", "==", currentChatId));
        const snap = await getDocs(q);
        const batch = writeBatch(db);
        snap.forEach(d => batch.delete(d.ref));
        await batch.commit();
        alert("Чат девственно чист.");
        closeModal('info-modal');
    };

    window.findAny = async () => {
        const val = globalSearch.value.trim().toLowerCase().replace('@', '');
        if (!val || val === myNick) return;
        
        const qU = query(collection(db, "users"), where("username", "==", val));
        const snapU = await getDocs(qU);

        if (!snapU.empty) {
            // ЛИЧКА (Исправлено)
            const dmId = [myNick, val].sort().join("_");
            await setDoc(doc(db, "chats", dmId), { id: dmId, users: [myNick, val], lastUpdate: serverTimestamp() }, { merge: true });
            switchChat(dmId, "@" + val);
        } else {
            // ГРУППА
            const gRef = doc(db, "groups", val);
            const gSnap = await getDoc(gRef);
            if (gSnap.exists()) {
                await updateDoc(gRef, { members: arrayUnion(myNick) });
                switchChat(val, "👥 " + gSnap.data().name);
            } else {
                if (confirm("Группа @" + val + " не найдена. Создать?")) {
                    await setDoc(gRef, { id: val, name: val, members: [myNick], admins: [myNick] });
                    switchChat(val, "👥 " + val);
                }
            }
        }
        globalSearch.value = "";
    };

    document.getElementById('sendBtn').onclick = sendMsg;
    document.getElementById('mInput').onkeydown = (e) => e.key === 'Enter' && sendMsg();

</script>
</body>
</html>
