<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>LiveMes. Admin Edition</title>
    <style>
        :root { 
            --accent: #007AFF; --bg: #f2f2f7; --glass: rgba(255, 255, 255, 0.9); 
            --border: rgba(0, 0, 0, 0.08); --text: #000; --bubble-my: #007AFF; --bubble-other: #fff;
        }
        [data-theme="dark"] {
            --bg: #000; --glass: rgba(28, 28, 30, 0.95); --border: rgba(255, 255, 255, 0.1); 
            --text: #fff; --bubble-other: #1c1c1e;
        }
        
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100dvh; display: flex; transition: 0.3s; overflow: hidden; }

        #sidebar { 
            width: 280px; background: var(--glass); border-right: 1px solid var(--border); 
            backdrop-filter: blur(20px); display: flex; flex-direction: column; padding: 15px; gap: 12px; z-index: 100;
            transition: transform 0.3s ease;
        }
        
        @media (max-width: 768px) {
            #sidebar { position: absolute; height: 100%; transform: translateX(-100%); width: 85%; }
            #sidebar.open { transform: translateX(0); box-shadow: 10px 0 30px rgba(0,0,0,0.3); }
        }

        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 90; backdrop-filter: blur(2px); }
        .overlay.active { display: block; }

        #active-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .sidebar-label { margin: 15px 0 5px 5px; font-size: 10px; opacity: 0.4; text-transform: uppercase; font-weight: bold; }
        .nav-item { padding: 12px; border-radius: 12px; cursor: pointer; font-size: 15px; color: var(--text); transition: 0.2s; }
        .nav-item.active { background: var(--accent); color: #fff; }

        #main { flex: 1; display: flex; flex-direction: column; height: 100dvh; width: 100%; overflow: hidden; position: relative; }
        #header { padding: 12px 15px; border-bottom: 1px solid var(--border); background: var(--glass); backdrop-filter: blur(15px); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg-row { display: flex; flex-direction: column; max-width: 85%; position: relative; }
        .my-msg { align-self: flex-end; align-items: flex-end; }
        
        .sender-tag { font-size: 11px; opacity: 0.6; margin-bottom: 2px; font-weight: bold; display: flex; align-items: center; gap: 6px; width: 100%; }
        .del-btn { cursor: pointer; font-size: 10px; opacity: 0.3; transition: 0.2s; }
        .del-btn:hover { opacity: 1; color: #ff3b30; }

        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 16px; background: var(--bubble-other); box-shadow: 0 1px 2px rgba(0,0,0,0.05); line-height: 1.4; word-wrap: break-word; }
        .my-msg .bubble { background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
        .other-msg .bubble { border-bottom-left-radius: 4px; border: 1px solid var(--border); }

        #footer { 
            padding: 10px 15px; background: var(--glass); border-top: 1px solid var(--border);
            backdrop-filter: blur(20px); display: flex; gap: 10px; align-items: center;
            padding-bottom: calc(12px + env(safe-area-inset-bottom)); flex-shrink: 0;
        }
        .input-wrap { flex: 1; background: rgba(0,0,0,0.05); border-radius: 22px; display: flex; padding: 2px 14px; align-items: center; border: 1px solid var(--border); }
        #mInput { flex: 1; border: none; outline: none; background: none; color: inherit; padding: 12px; font-size: 16px; width: 100%; }

        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: var(--glass); padding: 30px; border-radius: 28px; width: 100%; max-width: 320px; text-align: center; border: 1px solid var(--border); }
        .card input { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border); margin: 10px 0; background: rgba(0,0,0,0.02); color: inherit; font-size: 16px; outline: none; }
        .card button { width: 100%; padding: 14px; border-radius: 12px; background: var(--accent); color: #fff; border: none; font-weight: bold; font-size: 16px; margin-top: 10px; }
        
        .admin-star { color: #FFD700; font-size: 12px; }
        .hidden { display: none !important; }
        #clearBtn { background: none; border: none; font-size: 20px; cursor: pointer; padding: 5px; opacity: 0.6; }
        #clearBtn:hover { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body data-theme="light">

    <div id="overlay" class="overlay" onclick="toggleSidebar()"></div>

    <div id="profile-screen" class="modal hidden">
        <div class="card">
            <h2 style="color:var(--accent)">Профиль</h2>
            <input type="text" id="pName" placeholder="Имя">
            <input type="text" id="pNick" placeholder="Ник (напр. timon)">
            <button onclick="saveProfile()">Начать работу</button>
        </div>
    </div>

    <div id="auth-screen" class="modal">
        <div class="card">
            <h1 style="color:var(--accent)">LiveMes.</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <p onclick="register()" style="font-size:13px; margin-top:15px; opacity:0.5; cursor:pointer;">Регистрация</p>
        </div>
    </div>

    <div id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0;">LiveMes.</h2>
            <button onclick="toggleTheme()" style="background:none; border:none; font-size:22px; cursor:pointer;">🌓</button>
        </div>
        <input type="text" id="globalSearch" placeholder="Поиск @ника..." onkeydown="if(event.key==='Enter') findAny()" style="padding:12px; border-radius:12px; border:1px solid var(--border); background:rgba(0,0,0,0.03); color:inherit; outline:none; font-size:16px;">
        <div id="active-list">
            <div class="nav-item active" id="item-global" onclick="switchChat('global', '🌐 Глобальный чат')">🌐 Глобальный чат</div>
            <div class="sidebar-label">Личные сообщения</div>
            <div id="dm-list"></div>
        </div>
    </div>

    <div id="main">
        <div id="header">
            <div style="display:flex; align-items:center; gap:12px;">
                <span onclick="toggleSidebar()" style="font-size:24px; cursor:pointer;">☰</span>
                <h3 id="chat-title" style="margin:0;">Загрузка...</h3>
            </div>
            <button id="clearBtn" title="Очистить чат" class="hidden" onclick="clearCurrentChat()">🧹</button>
        </div>
        
        <div id="messages"></div>

        <div id="footer">
            <div class="input-wrap">
                <input type="text" id="mInput" placeholder="Сообщение..." autocomplete="off">
                <button id="sendBtn" style="background:none; border:none; color:var(--accent); font-size:28px; cursor:pointer;">➔</button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, onSnapshot, serverTimestamp, doc, getDoc, setDoc, where, getDocs, deleteDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAF8yT2TZtgJCVjZpsIWusH-25jZh2Cts",
        authDomain: "github-messenger-22bd3.firebaseapp.com",
        projectId: "github-messenger-22bd3",
        storageBucket: "github-messenger-22bd3.firebasestorage.app",
        messagingSenderId: "367012361010",
        appId: "1:367012361010:web:d02a53013d1e2387d25d2b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let user = null, myNick = "", myName = "", currentChatId = "global", unsubscribe = null;

    window.toggleSidebar = () => { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('overlay').classList.toggle('active'); };
    window.toggleTheme = () => { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); };

    onAuthStateChanged(auth, async (u) => {
        user = u;
        if (user) {
            document.getElementById('auth-screen').classList.add('hidden');
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                const d = snap.data();
                myNick = d.username;
                myName = d.name || d.username;
                loadMyDMs();
                switchChat('global', '🌐 Глобальный чат');
            } else {
                document.getElementById('profile-screen').classList.remove('hidden');
            }
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
        }
    });

    window.saveProfile = async () => {
        const nick = pNick.value.trim().toLowerCase();
        const name = pName.value.trim();
        if (nick.length < 2 || !name) return alert("Заполните поля!");
        await setDoc(doc(db, "users", user.uid), { username: nick, name: name, online: true });
        location.reload();
    };

    window.login = () => signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert(e.message));
    window.register = () => createUserWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert(e.message));

    function loadMyDMs() {
        onSnapshot(query(collection(db, "chats"), where("users", "array-contains", myNick)), (snap) => {
            const list = document.getElementById('dm-list'); list.innerHTML = "";
            snap.forEach(d => {
                const other = d.data().users.find(u => u !== myNick);
                const div = document.createElement('div');
                div.className = `nav-item ${currentChatId === d.id ? 'active' : ''}`;
                div.innerHTML = `💬 @${other}`;
                div.onclick = () => { switchChat(d.id, "@" + other); if(window.innerWidth < 768) toggleSidebar(); };
                list.appendChild(div);
            });
        });
    }

    // --- ПЕРЕКЛЮЧЕНИЕ ЧАТА С АДМИН-ФУНКЦИЯМИ ---
    window.switchChat = (id, title) => {
        currentChatId = id;
        document.getElementById('chat-title').innerText = title;
        
        // Кнопка очистки видна только timon или в личных чатах
        const clearBtn = document.getElementById('clearBtn');
        if (myNick === 'timon' || id.includes(myNick)) clearBtn.classList.remove('hidden');
        else clearBtn.classList.add('hidden');

        if (unsubscribe) unsubscribe();

        const q = query(collection(db, "messages"), where("chatId", "==", currentChatId));
        
        unsubscribe = onSnapshot(q, (snap) => {
            const box = document.getElementById('messages');
            let msgs = [];
            snap.forEach(docSnap => msgs.push({id: docSnap.id, ...docSnap.data()}));
            msgs.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0));

            box.innerHTML = "";
            msgs.forEach(d => {
                const isMe = d.uid === user.uid;
                const isAdmin = myNick === 'timon';
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'my-msg' : 'other-msg'}`;
                
                div.innerHTML = `
                    <div class="sender-tag">
                        ${d.senderNick === 'timon' ? '<span class="admin-star">★</span>' : ''} 
                        ${d.senderName} (@${d.senderNick})
                        ${(isMe || isAdmin) ? `<span class="del-btn" onclick="deleteMsg('${d.id}')">🗑</span>` : ''}
                    </div>
                    <div class="bubble">${d.text}</div>`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    };

    // --- УДАЛЕНИЕ ---
    window.deleteMsg = async (id) => {
        if (confirm("Удалить это сообщение?")) {
            await deleteDoc(doc(db, "messages", id));
        }
    };

    window.clearCurrentChat = async () => {
        if (!confirm("ВНИМАНИЕ! Полная очистка удалит ВСЕ сообщения в этом чате. Продолжить?")) return;
        const q = query(collection(db, "messages"), where("chatId", "==", currentChatId));
        const snap = await getDocs(q);
        const batch = writeBatch(db);
        snap.forEach(d => batch.delete(d.ref));
        await batch.commit();
        alert("Чат очищен!");
    };

    // --- ОТПРАВКА ---
    const sendMsg = async () => {
        const text = mInput.value.trim();
        if (!text || !user) return;
        const tempText = text;
        mInput.value = "";
        await addDoc(collection(db, "messages"), {
            chatId: currentChatId,
            senderNick: myNick,
            senderName: myName,
            uid: user.uid,
            text: tempText,
            createdAt: serverTimestamp()
        });
    };

    window.findAny = async () => {
        const val = globalSearch.value.trim().toLowerCase().replace('@', '');
        if (!val || val === myNick) return;
        const qU = query(collection(db, "users"), where("username", "==", val));
        const snapU = await getDocs(qU);
        if (!snapU.empty) {
            const target = snapU.docs[0].data().username;
            const dmId = [myNick, target].sort().join("_");
            await setDoc(doc(db, "chats", dmId), { id: dmId, users: [myNick, target], lastUpdate: serverTimestamp() });
            switchChat(dmId, "@" + target);
        } else alert("Пользователь не найден");
        globalSearch.value = "";
    };

    document.getElementById('sendBtn').onclick = sendMsg;
    document.getElementById('mInput').onkeydown = (e) => e.key === 'Enter' && sendMsg();

</script>
</body>
</html>
