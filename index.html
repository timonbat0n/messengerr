<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Messenger</title>
    <style>
        /* Минимальный темный стиль */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #0f0f0f; 
            color: #e0e0e0; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
        }
        
        #chat { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
        }

        .msg { 
            background: #1e1e1e; 
            padding: 10px 14px; 
            border-radius: 12px; 
            max-width: 85%; 
            align-self: flex-start;
            border: 1px solid #333;
            line-height: 1.4;
        }

        .msg b { 
            color: #39FF14; /* Твой любимый неоновый зеленый */
            display: block; 
            font-size: 0.85em; 
            margin-bottom: 2px;
        }

        .msg small {
            color: #777;
            font-weight: normal;
            margin-left: 5px;
        }

        #controls { 
            padding: 15px; 
            background: #181818; 
            border-top: 1px solid #333;
            display: flex; 
            flex-direction: column;
            gap: 10px; 
        }

        .input-row { display: flex; gap: 8px; }

        input { 
            background: #252525; 
            border: 1px solid #444; 
            color: white; 
            padding: 12px; 
            border-radius: 8px; 
            outline: none;
        }

        input:focus { border-color: #39FF14; }

        #userInput { width: 100px; }
        #messageInput { flex: 1; }

        button { 
            background: #39FF14; 
            border: none; 
            padding: 12px; 
            border-radius: 8px; 
            color: #000; 
            font-weight: bold; 
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:active { opacity: 0.7; }
    </style>
</head>
<body>

<div id="chat">
    </div>

<div id="controls">
    <div class="input-row">
        <input type="text" id="userInput" placeholder="Имя" maxlength="15">
        <input type="text" id="messageInput" placeholder="Сообщение...">
    </div>
    <button id="sendBtn">ОТПРАВИТЬ</button>
</div>

<script type="module">
  // Подключаем Firebase
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  // Твой конфиг
  const firebaseConfig = {
    apiKey: "AIzaSyBAF8yT2TZtgJCVjZpsIWusH-25jZh2Cts",
    authDomain: "github-messenger-22bd3.firebaseapp.com",
    projectId: "github-messenger-22bd3",
    storageBucket: "github-messenger-22bd3.firebasestorage.app",
    messagingSenderId: "367012361010",
    appId: "1:367012361010:web:d02a53013d1e2387d25d2b",
    measurementId: "G-4JKWDFX9H1"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const messagesCol = collection(db, "messages");

  // Функция отправки
  const sendMessage = async () => {
    const user = document.getElementById('userInput').value || "Аноним";
    const text = document.getElementById('messageInput').value;
    
    if (text.trim()) {
      try {
        await addDoc(messagesCol, {
          user: user,
          text: text,
          createdAt: serverTimestamp()
        });
        document.getElementById('messageInput').value = "";
      } catch (e) {
        alert("Ошибка! Проверь Rules в Firebase");
      }
    }
  };

  document.getElementById('sendBtn').onclick = sendMessage;

  // Отправка по Enter
  document.getElementById('messageInput').onkeypress = (e) => {
    if (e.key === 'Enter') sendMessage();
  };

  // Получение сообщений в реальном времени
  const q = query(messagesCol, orderBy("createdAt", "asc"));
  onSnapshot(q, (snapshot) => {
    const chatDiv = document.getElementById('chat');
    chatDiv.innerHTML = "";
    snapshot.forEach((doc) => {
      const data = doc.data();
      const div = document.createElement('div');
      div.className = 'msg';
      const time = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : "...";
      div.innerHTML = `<b>${data.user} <small>${time}</small></b> ${data.text}`;
      chatDiv.appendChild(div);
    });
    chatDiv.scrollTop = chatDiv.scrollHeight;
  });
</script>

</body>
</html>
