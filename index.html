<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Messenger | Firebase</title>
    <style>
        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: #0b0b0b; color: #eee; margin: 0; 
            display: flex; flex-direction: column; height: 100vh; 
        }

        /* Экран входа */
        #auth-screen { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; height: 100%; gap: 15px; 
        }
        .auth-card { 
            background: #181818; padding: 25px; border-radius: 15px; 
            border: 1px solid #333; width: 300px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        /* Чат */
        #chat-screen { display: none; flex-direction: column; height: 100%; }
        #chat-header { 
            padding: 15px; background: #181818; border-bottom: 1px solid #333; 
            display: flex; justify-content: space-between; align-items: center;
        }
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }

        /* Сообщения */
        .msg { 
            background: #1e1e1e; padding: 10px 14px; border-radius: 12px; 
            max-width: 80%; border: 1px solid #333; position: relative;
        }
        .msg b { color: #39FF14; display: block; font-size: 0.8em; margin-bottom: 3px; }
        .msg small { color: #666; font-size: 0.7em; margin-left: 8px; }

        /* Поля ввода */
        input { 
            width: 100%; box-sizing: border-box; background: #252525; 
            border: 1px solid #444; color: #fff; padding: 12px; 
            border-radius: 8px; margin-bottom: 10px; outline: none;
        }
        input:focus { border-color: #39FF14; }

        button { 
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .btn-main { background: #39FF14; color: #000; }
        .btn-sub { background: transparent; color: #888; text-decoration: underline; margin-top: 5px; }
        .btn-logout { background: #ff4444; color: white; width: auto; padding: 5px 12px; font-size: 0.8em; }

        #controls { padding: 15px; background: #181818; border-top: 1px solid #333; display: flex; gap: 10px; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="text-align:center; color:#39FF14">Вход в систему</h2>
            <input type="email" id="emailInput" placeholder="Электронная почта">
            <input type="password" id="passInput" placeholder="Пароль">
            <button id="loginBtn" class="btn-main">ВОЙТИ</button>
            <button id="registerBtn" class="btn-sub">Нет аккаунта? Создать</button>
        </div>
    </div>

    <div id="chat-screen">
        <div id="chat-header">
            <span id="userLabel" style="color: #888; font-size: 0.9em;"></span>
            <button id="logoutBtn" class="btn-logout">Выйти</button>
        </div>
        <div id="chat-messages"></div>
        <div id="controls">
            <input type="text" id="msgInput" placeholder="Ваше сообщение..." style="margin-bottom: 0;">
            <button id="sendBtn" class="btn-main" style="width: auto;">📡</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // КОНФИГ ТВОЕГО ПРОЕКТА
    const firebaseConfig = {
        apiKey: "AIzaSyBAF8yT2TZtgJCVjZpsIWusH-25jZh2Cts",
        authDomain: "github-messenger-22bd3.firebaseapp.com",
        projectId: "github-messenger-22bd3",
        storageBucket: "github-messenger-22bd3.firebasestorage.app",
        messagingSenderId: "367012361010",
        appId: "1:367012361010:web:d02a53013d1e2387d25d2b",
        measurementId: "G-4JKWDFX9H1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const msgCol = collection(db, "messages");

    let user = null;

    // --- ЛОГИКА АВТОРИЗАЦИИ ---

    // Вход
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passInput').value;
        try { await signInWithEmailAndPassword(auth, email, pass); } 
        catch (e) { alert("Ошибка: " + e.message); }
    };

    // Регистрация
    document.getElementById('registerBtn').onclick = async () => {
        const email = document.getElementById('emailInput').value;
        const pass = document.getElementById('passInput').value;
        try { 
            await createUserWithEmailAndPassword(auth, email, pass); 
            alert("Аккаунт создан!");
        } catch (e) { alert("Ошибка: " + e.message); }
    };

    // Выход
    document.getElementById('logoutBtn').onclick = () => signOut(auth);

    // Слежка за статусом входа
    onAuthStateChanged(auth, (u) => {
        user = u;
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            document.getElementById('userLabel').innerText = user.email;
            loadMessages();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('chat-screen').style.display = 'none';
        }
    });

    // --- ЛОГИКА ЧАТА ---

    const sendMsg = async () => {
        const text = document.getElementById('msgInput').value;
        if (text.trim() && user) {
            await addDoc(msgCol, {
                email: user.email,
                text: text,
                createdAt: serverTimestamp()
            });
            document.getElementById('msgInput').value = "";
        }
    };

    document.getElementById('sendBtn').onclick = sendMsg;
    document.getElementById('msgInput').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

    function loadMessages() {
        const q = query(msgCol, orderBy("createdAt", "asc"));
        onSnapshot(q, (snap) => {
            const box = document.getElementById('chat-messages');
            box.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const div = document.createElement('div');
                div.className = 'msg';
                const time = d.createdAt ? new Date(d.createdAt.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "...";
                // Обрезаем email до @ для ника
                const nick = d.email ? d.email.split('@')[0] : "Аноним";
                div.innerHTML = `<b>${nick} <small>${time}</small></b> ${d.text}`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }
</script>
</body>
</html>
