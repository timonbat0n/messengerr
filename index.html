<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MODR. Ultimate Messenger</title>
    <style>
        :root {
            --neon: #39FF14;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        body { 
            font-family: -apple-system, system-ui, sans-serif; 
            background: #000; color: #fff; margin: 0; 
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* Авторизация */
        #auth-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; background: radial-gradient(circle at center, #1a1a1a 0%, #000 100%); }
        .auth-card { background: var(--glass); backdrop-filter: blur(20px); padding: 30px; border-radius: 25px; border: 1px solid var(--border); width: 80%; max-width: 300px; text-align: center; }

        /* Чат */
        #chat-screen { display: none; flex-direction: column; height: 100%; background: url('https://w.wallhaven.cc/full/ex/wallhaven-ex96pw.png') center/cover; }
        
        #header { padding: 15px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }

        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }

        /* Стили сообщений */
        .msg-row { display: flex; gap: 10px; width: 100%; transition: 0.3s; }
        .my-msg { flex-direction: row-reverse; align-self: flex-end; }
        
        .avatar { width: 35px; height: 35px; border-radius: 50%; border: 1px solid var(--neon); object-fit: cover; }
        
        .bubble { 
            max-width: 70%; padding: 10px 15px; border-radius: 18px; 
            background: var(--glass); backdrop-filter: blur(10px); border: 1px solid var(--border);
            position: relative; line-height: 1.4;
        }
        .my-msg .bubble { border-color: var(--neon); box-shadow: 0 0 10px rgba(57, 255, 20, 0.1); }

        .bubble b { color: var(--neon); font-size: 0.8em; display: block; margin-bottom: 2px; }
        .bubble small { color: #888; font-size: 0.7em; margin-left: 5px; }
        
        .del-btn { background: none; border: none; color: #ff4444; font-size: 12px; cursor: pointer; margin-top: 5px; opacity: 0.5; }
        .del-btn:hover { opacity: 1; }

        /* Индикатор печати */
        #typing { font-size: 0.8em; color: var(--neon); padding: 5px 15px; height: 20px; font-style: italic; opacity: 0.8; }

        /* Поля ввода */
        #footer { padding: 15px; background: rgba(0,0,0,0.8); display: flex; gap: 10px; padding-bottom: env(safe-area-inset-bottom); }
        input { background: rgba(255,255,255,0.1); border: 1px solid #444; color: #fff; padding: 12px; border-radius: 12px; outline: none; flex: 1; }
        button { background: var(--neon); color: #000; border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; }

        #profile-modal { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 100; 
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h2 style="color: var(--neon)">MODR. LOGIN</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="login()" style="width: 100%">ВОЙТИ</button>
            <button onclick="register()" style="background:none; color:#888; font-size: 0.8em; text-decoration: underline;">Регистрация</button>
        </div>
    </div>

    <div id="chat-screen">
        <div id="header">
            <button onclick="toggleProfile(true)" style="background:none; color:var(--neon)">⚙️ Профиль</button>
            <button onclick="logout()" style="background:none; color:#ff4444">Выйти</button>
        </div>

        <div id="messages"></div>
        <div id="typing"></div>

        <div id="footer">
            <input type="text" id="mInput" placeholder="Сообщение..." oninput="sendTyping()">
            <button id="sendBtn">📡</button>
        </div>
    </div>

    <div id="profile-modal">
        <div class="auth-card">
            <h3 style="color: var(--neon)">Настройки</h3>
            <input type="text" id="nickName" placeholder="Никнейм">
            <input type="text" id="avatarLink" placeholder="Ссылка на фото">
            <button onclick="saveProfile()" style="width: 100%">СОХРАНИТЬ</button>
            <button onclick="toggleProfile(false)" style="background:none; color:#888">Закрыть</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAF8yT2TZtgJCVjZpsIWusH-25jZh2Cts",
        authDomain: "github-messenger-22bd3.firebaseapp.com",
        projectId: "github-messenger-22bd3",
        storageBucket: "github-messenger-22bd3.firebasestorage.app",
        messagingSenderId: "367012361010",
        appId: "1:367012361010:web:d02a53013d1e2387d25d2b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let user = null;
    let profile = { nickname: '', avatar: '' };
    const adminEmail = "timoneskin@vk.com"; // ВПИШИ СВОЙ EMAIL

    // --- АВТОРИЗАЦИЯ ---
    window.login = () => signInWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert(e.message));
    window.register = () => createUserWithEmailAndPassword(auth, email.value, pass.value).catch(e => alert(e.message));
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, async (u) => {
        user = u;
        if (user) {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('chat-screen').style.display = 'flex';
            const d = await getDoc(doc(db, "users", user.uid));
            if (d.exists()) profile = d.data();
            initChat();
        } else {
            document.getElementById('auth-screen').style.display = 'flex';
            document.getElementById('chat-screen').style.display = 'none';
        }
    });

    // --- ПРОФИЛЬ ---
    window.toggleProfile = (show) => document.getElementById('profile-modal').style.display = show ? 'flex' : 'none';
    window.saveProfile = async () => {
        await setDoc(doc(db, "users", user.uid), {
            nickname: nickName.value,
            avatar: avatarLink.value
        });
        location.reload();
    };

    // --- ЧАТ ---
    const sendMsg = async () => {
        const text = mInput.value.trim();
        if (text && user) {
            await addDoc(collection(db, "messages"), {
                uid: user.uid,
                email: user.email,
                nick: profile.nickname || user.email.split('@')[0],
                ava: profile.avatar || '',
                text: text,
                createdAt: serverTimestamp()
            });
            mInput.value = "";
        }
    };

    document.getElementById('sendBtn').onclick = sendMsg;

    // Типинг (печатает...)
    let typingTimeout;
    window.sendTyping = () => {
        setDoc(doc(db, "status", "typing"), { [user.email.split('@')[0]]: true }, { merge: true });
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {
            setDoc(doc(db, "status", "typing"), { [user.email.split('@')[0]]: false }, { merge: true });
        }, 3000);
    };

    function initChat() {
        // Слушаем сообщения
        onSnapshot(query(collection(db, "messages"), orderBy("createdAt", "asc")), (snap) => {
            const box = document.getElementById('messages');
            box.innerHTML = "";
            snap.forEach(dDoc => {
                const d = dDoc.data();
                const isMe = d.uid === user.uid;
                const isAdmin = user.email === adminEmail;
                const time = d.createdAt ? new Date(d.createdAt.seconds * 1000).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
                
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'my-msg' : ''}`;
                div.innerHTML = `
                    <img src="${d.ava || 'https://www.gravatar.com/avatar/0?d=mp'}" class="avatar">
                    <div class="bubble">
                        <b>${d.nick} <small>${time}</small></b>
                        <span>${d.text}</span>
                        ${isAdmin ? `<br><button class="del-btn" onclick="deleteMessage('${dDoc.id}')">🗑️ удалить</button>` : ''}
                    </div>
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });

        // Слушаем типинг
        onSnapshot(doc(db, "status", "typing"), (d) => {
            const data = d.data();
            const typers = Object.keys(data).filter(k => data[k] === true && k !== user.email.split('@')[0]);
            document.getElementById('typing').innerText = typers.length ? `${typers.join(', ')} печатает...` : "";
        });
    }

    window.deleteMessage = async (id) => {
        if(confirm("Удалить сообщение?")) await deleteDoc(doc(db, "messages", id));
    };
</script>
</body>
</html>
