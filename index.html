<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LiveMes.</title>
    <style>
        :root { 
            --accent: #007AFF; --bg: #f2f2f7; --glass: rgba(255, 255, 255, 0.8); 
            --border: rgba(0, 0, 0, 0.05); --text: #000000; --bubble-my: #007AFF; --bubble-other: #ffffff;
        }
        [data-theme="dark"] {
            --bg: #000000; --glass: rgba(28, 28, 30, 0.9); --border: rgba(255, 255, 255, 0.1); 
            --text: #ffffff; --bubble-other: #1c1c1e;
        }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; transition: 0.3s; overflow: hidden; }

        /* Sidebar */
        #sidebar { width: 280px; background: var(--glass); border-right: 1px solid var(--border); backdrop-filter: blur(20px); display: flex; flex-direction: column; padding: 15px; gap: 15px; z-index: 10; }
        .search-area { background: rgba(0,0,0,0.04); border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; gap: 8px; }
        [data-theme="dark"] .search-area { background: rgba(255,255,255,0.08); }
        .search-area input { background: none; border: none; outline: none; color: inherit; width: 100%; font-size: 0.9em; }

        #dynamic-chats { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .nav-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; transition: 0.2s; font-weight: 500; font-size: 0.9em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .nav-item:hover { background: rgba(0,0,0,0.04); }
        .nav-item.active { background: var(--accent); color: #fff; }

        /* Main Chat */
        #main { flex: 1; display: flex; flex-direction: column; background: transparent; }
        #header { padding: 15px 25px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: var(--glass); backdrop-filter: blur(10px); }

        /* Messages - COMPACT & FIXED */
        #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg-row { display: flex; flex-direction: column; max-width: 75%; }
        .my-msg { align-self: flex-end; align-items: flex-end; }
        .other-msg { align-self: flex-start; align-items: flex-start; }
        
        .bubble { 
            padding: 8px 14px; border-radius: 18px; font-size: 0.95em; line-height: 1.4;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); background: var(--bubble-other); 
            max-width: 450px; /* Жесткий лимит ширины */
            overflow-wrap: anywhere; /* Ломает даже очень длинные слова */
            word-break: normal;
        }
        .my-msg .bubble { background: var(--bubble-my); color: #fff; border-bottom-right-radius: 4px; }
        .other-msg .bubble { border-bottom-left-radius: 4px; border: 1px solid var(--border); }
        .sender-name { font-size: 0.7em; margin-bottom: 2px; opacity: 0.5; padding: 0 5px; }

        /* Footer */
        #footer { padding: 15px 20px; display: flex; gap: 10px; align-items: center; background: var(--glass); backdrop-filter: blur(10px); border-top: 1px solid var(--border); }
        .input-wrap { flex: 1; background: rgba(0,0,0,0.04); border-radius: 20px; display: flex; padding: 2px 12px; align-items: center; }
        [data-theme="dark"] .input-wrap { background: rgba(255,255,255,0.08); }
        #mInput { flex: 1; border: none; outline: none; background: none; color: inherit; padding: 8px; font-size: 15px; }
        
        .btn-icon { background: none; border: none; cursor: pointer; color: var(--text); padding: 5px; display: flex; align-items: center; transition: 0.2s; }
        .btn-icon:hover { color: var(--accent); }

        /* Modals */
        .modal { position: absolute; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .card { background: var(--glass); padding: 30px; border-radius: 25px; width: 280px; border: 1px solid var(--border); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .card input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border); margin: 8px 0; background: rgba(0,0,0,0.02); color: inherit; box-sizing: border-box; outline: none; }
        
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; display: block; }
        .hidden { display: none !important; }
    </style>
</head>
<body data-theme="light">

    <div id="username-screen" class="modal hidden">
        <div class="card">
            <h2 style="color:var(--accent); margin-top:0">LiveMes.</h2>
            <input type="text" id="newUsername" placeholder="Ваш ник">
            <button onclick="setupUsername()" style="width:100%; padding:12px; border-radius:10px; background:var(--accent); color:#fff; border:none; font-weight:bold; cursor:pointer; margin-top:10px;">Начать</button>
        </div>
    </div>

    <div id="auth-screen" class="modal">
        <div class="card">
            <h1 style="color:var(--accent); margin-top:0">LiveMes.</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Пароль">
            <button onclick="login()" style="width:100%; padding:12px; border-radius:10px; background:var(--accent); color:#fff; border:none; font-weight:bold; cursor:pointer; margin-top:10px;">Войти</button>
            <p onclick="register()" style="font-size:0.8em; margin-top:15px; cursor:pointer; opacity:0.5;">Создать аккаунт</p>
        </div>
    </div>

    <div id="sidebar">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h2 style="margin:0; font-size: 1.4em;">LiveMes.</h2>
            <button class="btn-icon" onclick="toggleTheme()" style="font-size: 1.2em;">🌓</button>
        </div>
        
        <div class="search-area">
            <input type="text" id="globalSearch" placeholder="Найти ник..." onkeydown="if(event.key==='Enter') findAny()">
        </div>

        <div id="dynamic-chats">
            <div class="nav-item active" id="item-global" onclick="switchChat('global', 'Глобальный чат')">🌐 Глобальный чат</div>
            <div style="margin: 10px 0 5px 5px; font-size: 0.65em; opacity: 0.4; text-transform: uppercase; letter-spacing: 0.5px;">Мои чаты и группы</div>
            <div id="group-list-container"></div>
        </div>

        <button onclick="createGroup()" style="background:var(--accent); color:#fff; border:none; width:100%; padding:10px; border-radius:10px; cursor:pointer; font-weight:600; font-size:0.85em;">+ Создать группу</button>
        <div id="my-nick-display" style="font-size:0.8em; text-align:center; opacity:0.6"></div>
    </div>

    <div id="main">
        <div id="header">
            <h3 id="chat-title" style="margin:0; font-size: 1.1em;">Глобальный чат</h3>
        </div>
        <div id="messages"></div>
        <div id="footer">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            <div class="input-wrap">
                <button class="btn-icon" onclick="document.getElementById('fileInput').click()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
                </button>
                <input type="text" id="mInput" placeholder="Сообщение...">
                <button id="sendBtn" class="btn-icon" style="color:var(--accent);">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, getDoc, setDoc, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAF8yT2TZtgJCVjZpsIWusH-25jZh2Cts",
        authDomain: "github-messenger-22bd3.firebaseapp.com",
        projectId: "github-messenger-22bd3",
        storageBucket: "github-messenger-22bd3.firebasestorage.app",
        messagingSenderId: "367012361010",
        appId: "1:367012361010:web:d02a53013d1e2387d25d2b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let user = null, myNick = "", currentChatId = "global", unsubscribe = null;

    window.toggleTheme = () => {
        const theme = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', theme);
    };

    onAuthStateChanged(auth, async (u) => {
        user = u;
        if (user) {
            document.getElementById('auth-screen').classList.add('hidden');
            const snap = await getDoc(doc(db, "users", user.uid));
            if (snap.exists()) {
                myNick = snap.data().username;
                document.getElementById('my-nick-display').innerText = "@" + myNick;
                loadGroups();
                switchChat('global', 'Глобальный чат');
            } else document.getElementById('username-screen').classList.remove('hidden');
        } else document.getElementById('auth-screen').classList.remove('hidden');
    });

    window.login = () => signInWithEmailAndPassword(auth, email.value, pass.value);
    window.register = () => createUserWithEmailAndPassword(auth, email.value, pass.value);
    window.logout = () => signOut(auth);

    window.setupUsername = async () => {
        const nick = newUsername.value.trim().toLowerCase();
        if (nick.length < 3) return alert("Минимум 3 символа");
        await setDoc(doc(db, "users", user.uid), { username: nick });
        location.reload();
    };

    // --- ГРУППЫ ---
    window.createGroup = async () => {
        const name = prompt("Название новой группы:");
        if (name) {
            const id = "group_" + Date.now();
            await addDoc(collection(db, "groups"), { name, id, creator: myNick });
        }
    };

    function loadGroups() {
        onSnapshot(collection(db, "groups"), (snap) => {
            const list = document.getElementById('group-list-container');
            list.innerHTML = "";
            snap.forEach(doc => {
                const g = doc.data();
                const div = document.createElement('div');
                div.className = `nav-item ${currentChatId === g.id ? 'active' : ''}`;
                div.innerHTML = `👥 ${g.name}`;
                div.onclick = () => switchChat(g.id, "👥 " + g.name);
                list.appendChild(div);
            });
        });
    }

    window.findAny = async () => {
        const val = globalSearch.value.trim().toLowerCase();
        if (!val) return;
        const qU = query(collection(db, "users"), where("username", "==", val));
        const snapU = await getDocs(qU);
        if (!snapU.empty) {
            const dmId = [myNick, val].sort().join("_");
            switchChat(dmId, "💬 @" + val);
        } else alert("Пользователь не найден");
        globalSearch.value = "";
    };

    // --- СООБЩЕНИЯ ---
    const sendMsg = async (text = "", img = "") => {
        if (!user || (!text && !img)) return;
        await addDoc(collection(db, "messages"), {
            chatId: currentChatId,
            sender: "@" + myNick,
            uid: user.uid,
            text, img,
            createdAt: serverTimestamp()
        });
        mInput.value = "";
    };

    document.getElementById('sendBtn').onclick = () => sendMsg(mInput.value);
    mInput.onkeydown = (e) => { if(e.key === 'Enter') sendMsg(mInput.value); };

    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onloadend = () => sendMsg("", reader.result);
            reader.readAsDataURL(file);
        }
    };

    window.switchChat = (id, title) => {
        currentChatId = id;
        document.getElementById('chat-title').innerText = title;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if(id === 'global') document.getElementById('item-global').classList.add('active');
        
        if (unsubscribe) unsubscribe();
        const q = query(collection(db, "messages"), orderBy("createdAt", "asc"));
        unsubscribe = onSnapshot(q, (snap) => {
            const box = document.getElementById('messages');
            box.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                if (d.chatId !== currentChatId) return;
                const isMe = d.uid === user.uid;
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'my-msg' : 'other-msg'}`;
                div.innerHTML = `
                    <div class="sender-name">${d.sender}</div>
                    <div class="bubble">
                        ${d.text ? `<div>${d.text}</div>` : ''}
                        ${d.img ? `<img src="${d.img}" class="chat-img" onclick="window.open('${d.img}')">` : ''}
                    </div>
                `;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    };

</script>
</body>
</html>
