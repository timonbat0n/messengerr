<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MODR. OS | Messenger</title>
    <style>
        :root { --neon: #39FF14; --glass: rgba(255, 255, 255, 0.08); --border: rgba(255, 255, 255, 0.15); }
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; height: 100vh; display: flex; overflow: hidden; }

        /* Sidebar */
        #sidebar { 
            width: 80px; background: rgba(0,0,0,0.8); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; align-items: center; padding: 15px 0; gap: 20px;
            transition: width 0.3s; z-index: 10;
        }
        .chat-icon { 
            width: 50px; height: 50px; border-radius: 15px; background: var(--glass); 
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px; transition: 0.2s;
        }
        .chat-icon.active { border-color: var(--neon); box-shadow: 0 0 10px var(--neon); }

        /* Main Area */
        #main { flex: 1; display: flex; flex-direction: column; background: #0a0a0a; position: relative; }
        
        /* Auth Screen */
        #auth-screen { position: absolute; inset: 0; background: #000; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: var(--glass); padding: 30px; border-radius: 20px; border: 1px solid var(--border); width: 280px; text-align: center; }

        /* Chat Content */
        #header { padding: 15px; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        #messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .msg-row { display: flex; gap: 8px; max-width: 85%; }
        .my-msg { align-self: flex-end; flex-direction: row-reverse; }
        .bubble { background: var(--glass); padding: 10px 15px; border-radius: 15px; border: 1px solid var(--border); font-size: 0.95em; }
        .my-msg .bubble { border-color: var(--neon); }
        .bubble b { color: var(--neon); font-size: 0.8em; display: block; }

        #input-area { padding: 15px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 12px; outline: none; }
        button { background: var(--neon); border: none; padding: 12px 20px; border-radius: 12px; font-weight: bold; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="chat-icon active" onclick="switchChat('global')" title="Общий чат">🌍</div>
        <div id="direct-chats"></div>
        <div class="chat-icon" onclick="createGroup()" title="Создать группу">+</div>
        <div class="chat-icon" onclick="logout()" style="margin-top: auto; color: #ff4444;">🚪</div>
    </div>

    <div id="main">
        <div id="auth-screen">
            <div class="auth-card">
                <h2 style="color: var(--neon)">MODR. OS</h2>
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Password">
                <button onclick="login()" style="width: 100%">ВОЙТИ</button>
                <button onclick="register()" style="background:none; color:#888; font-size:0.8em; margin-top:10px;">Регистрация</button>
            </div>
        </div>

        <div id="header">
            <span id="chat-title">Общий чат</span>
            <button onclick="openProfile()" style="background:none; color:var(--neon); padding:0">Профиль</button>
        </div>

        <div id="messages"></div>

        <div id="input-area">
            <input type="text" id="mInput" placeholder="Сообщение...">
            <button id="sendBtn">📡</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, doc, setDoc, getDoc, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBAF8yT2TZtgJCVjZpsIWusH-25jZh2Cts",
        authDomain: "github-messenger-22bd3.firebaseapp.com",
        projectId: "github-messenger-22bd3",
        storageBucket: "github-messenger-22bd3.firebasestorage.app",
        messagingSenderId: "367012361010",
        appId: "1:367012361010:web:d02a53013d1e2387d25d2b"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let user = null;
    let currentChatId = "global";
    let unsubscribe = null;

    // --- AUTH ---
    window.login = () => signInWithEmailAndPassword(auth, email.value, pass.value);
    window.register = () => createUserWithEmailAndPassword(auth, email.value, pass.value);
    window.logout = () => signOut(auth);

    onAuthStateChanged(auth, (u) => {
        user = u;
        if (user) {
            document.getElementById('auth-screen').classList.add('hidden');
            loadUserList();
            switchChat('global');
        } else {
            document.getElementById('auth-screen').classList.remove('hidden');
        }
    });

    // --- ЛОГИКА ЧАТОВ ---
    window.switchChat = (id, title = "Общий чат") => {
        currentChatId = id;
        document.getElementById('chat-title').innerText = title;
        
        // Подсвечиваем иконку
        document.querySelectorAll('.chat-icon').forEach(el => el.classList.remove('active'));
        // (Тут можно добавить логику поиска нужной иконки)

        loadMessages();
    };

    // Загрузка списка пользователей для ЛС
    async function loadUserList() {
        const side = document.getElementById('direct-chats');
        // В реальном приложении лучше создать коллекцию users, но для теста выведем кнопку ЛС
        side.innerHTML = `<div class="chat-icon" onclick="startPrivateChat()" title="Личка">👤</div>`;
    }

    window.startPrivateChat = () => {
        const targetEmail = prompt("Введите email собеседника:");
        if (targetEmail) {
            // Создаем уникальный ID для двоих (сортируем по алфавиту, чтобы ID всегда был один)
            const id = [user.email, targetEmail].sort().join("_");
            switchChat(id, `Чат с ${targetEmail.split('@')[0]}`);
        }
    };

    // Отправка
    const sendMsg = async () => {
        const text = mInput.value.trim();
        if (text && user) {
            await addDoc(collection(db, "messages"), {
                chatId: currentChatId,
                uid: user.uid,
                nick: user.email.split('@')[0],
                text: text,
                createdAt: serverTimestamp()
            });
            mInput.value = "";
        }
    };
    document.getElementById('sendBtn').onclick = sendMsg;

    // Загрузка сообщений конкретного чата
    function loadMessages() {
        if (unsubscribe) unsubscribe();
        
        const q = query(
            collection(db, "messages"), 
            where("chatId", "==", currentChatId), 
            orderBy("createdAt", "asc")
        );

        unsubscribe = onSnapshot(q, (snap) => {
            const box = document.getElementById('messages');
            box.innerHTML = "";
            snap.forEach(dDoc => {
                const d = dDoc.data();
                const isMe = d.uid === user.uid;
                const div = document.createElement('div');
                div.className = `msg-row ${isMe ? 'my-msg' : ''}`;
                div.innerHTML = `<div class="bubble"><b>${d.nick}</b>${d.text}</div>`;
                box.appendChild(div);
            });
            box.scrollTop = box.scrollHeight;
        });
    }

</script>
</body>
</html>
